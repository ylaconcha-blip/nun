<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NùN — trayectoria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@200;300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --bg:#050810; }
body { background:var(--bg); font-family:'Inter',sans-serif; overflow:hidden; width:100vw; height:100vh; color:rgba(255,255,255,.7); }

canvas { position:fixed; inset:0; width:100%; height:100%; }

/* NAV */
#nav {
  position:fixed; top:1.8rem; left:2rem; right:2rem;
  display:flex; align-items:center; justify-content:space-between;
  z-index:100;
}
#nav-titulo {
  font-family:'Barlow Condensed',sans-serif; font-size:1.2rem;
  font-weight:200; letter-spacing:.4em; color:rgba(255,255,255,.6);
  text-decoration:none; text-transform:lowercase;
}
#nav-titulo span { color:rgba(255,255,255,.25); }
#nav-links { display:flex; gap:2rem; }
#nav-links a {
  color:rgba(255,255,255,.2); text-decoration:none; font-size:.6rem;
  letter-spacing:.35em; text-transform:lowercase; transition:color .4s; font-weight:300;
}
#nav-links a:hover { color:rgba(255,255,255,.6); }
#nav-links a.activo { color:rgba(255,255,255,.6); }

/* CAPAS — izquierda */
#capas {
  position:fixed; top:5rem; left:2rem;
  display:flex; flex-direction:column; gap:.5rem;
  z-index:100;
}

.capa {
  display:flex; align-items:center; gap:.6rem;
  cursor:pointer; user-select:none; transition:opacity .3s;
}
.capa.off { opacity:.2; }
.capa:hover { opacity:1 !important; }

.capa-dot {
  width:7px; height:7px; border-radius:50%; flex-shrink:0;
  transition:transform .3s;
}
.capa.off .capa-dot { transform:scale(.6); }

.capa-info {
  display:flex; flex-direction:column; gap:.15rem;
}
.capa-nombre {
  font-size:.5rem; letter-spacing:.28em; text-transform:lowercase;
  color:rgba(255,255,255,.8); font-weight:300;
}
.capa-estado {
  font-size:.38rem; letter-spacing:.2em; color:rgba(255,255,255,.25); font-weight:300;
}

/* separador */
.capa-sep { height:1px; background:rgba(255,255,255,.06); margin:.2rem 0; }

/* PANEL INFO */
#info-panel {
  position:fixed; top:50%; right:2rem; transform:translateY(-50%);
  width:260px; background:rgba(5,8,16,.95);
  border:1px solid rgba(255,255,255,.06);
  padding:1.5rem; z-index:100;
  opacity:0; pointer-events:none;
  transition:opacity .4s;
}
#info-panel.visible { opacity:1; pointer-events:all; }
#info-cerrar {
  position:absolute; top:.8rem; right:.8rem;
  background:none; border:none; color:rgba(255,255,255,.3);
  cursor:pointer; font-size:1rem; transition:color .3s;
}
#info-cerrar:hover { color:white; }
#info-tipo {
  font-size:.42rem; letter-spacing:.35em; text-transform:lowercase;
  color:rgba(255,255,255,.3); margin-bottom:.8rem; font-weight:300;
}
#info-nombre {
  font-family:'Barlow Condensed',sans-serif; font-size:1.4rem;
  font-weight:300; letter-spacing:.1em; color:white; margin-bottom:1rem; line-height:1.1;
}
#info-datos { display:flex; flex-direction:column; gap:.5rem; }
.info-fila {
  display:flex; justify-content:space-between; align-items:flex-start;
  border-bottom:1px solid rgba(255,255,255,.04); padding-bottom:.4rem;
}
.info-key { font-size:.45rem; letter-spacing:.2em; color:rgba(255,255,255,.3); font-weight:300; text-transform:lowercase; }
.info-val { font-size:.5rem; letter-spacing:.1em; color:rgba(255,255,255,.7); font-weight:300; text-align:right; max-width:55%; }

/* STATS esquina inferior derecha */
#stats {
  position:fixed; bottom:1.8rem; right:2rem;
  display:flex; flex-direction:column; gap:.3rem; align-items:flex-end;
  z-index:100; opacity:.4;
}
.stat-row { font-size:.42rem; letter-spacing:.2em; color:rgba(255,255,255,.6); font-weight:300; }

/* HINT */
#hint {
  position:fixed; bottom:1.8rem; left:50%; transform:translateX(-50%);
  font-size:.48rem; letter-spacing:.35em; color:rgba(255,255,255,.1);
  text-transform:lowercase; pointer-events:none; white-space:nowrap;
  transition:opacity .5s;
}

/* LOADING */
#loading {
  position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
  z-index:200; background:var(--bg); transition:opacity 1s ease;
}
#loading.oculto { opacity:0; pointer-events:none; }
#loading-txt {
  font-family:'Barlow Condensed',sans-serif; font-size:1rem;
  letter-spacing:.4em; color:rgba(255,255,255,.3); text-transform:lowercase;
  animation:pulsar 2s ease infinite;
}
@keyframes pulsar { 0%,100%{opacity:.3} 50%{opacity:.8} }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="loading"><div id="loading-txt">cargando datos</div></div>

<div id="nav">
  <a href="/" id="nav-titulo">NùN <span>/ trayectoria</span></a>
  <div id="nav-links">
    <a href="/">mapa</a>
    <a href="/trayectoria.html" class="activo">trayectoria</a>
  </div>
</div>

<div id="capas">
  <!-- barcos -->

    <div class="capa-dot" style="background:rgba(220,180,80,1)"></div>
    <div class="capa-info">
      <span class="capa-nombre">tortugas marinas</span>
      <span class="capa-estado" id="est-tortugas">cargando…</span>
    </div>

  <div class="capa-sep"></div>
  <!-- sismos -->
  <div class="capa" id="capa-sismos" onclick="toggle('sismos')">

    <div class="capa-info">
      <span class="capa-nombre">sismos (USGS)</span>

  <!-- temperatura -->
  <div class="capa" id="capa-temp" onclick="toggle('temp')">

      <span class="capa-nombre">temperatura superficial</span>

  <!-- cetáceos avistados -->
  <div class="capa" id="capa-avistamientos" onclick="toggle('avistamientos')">
    <div class="capa-dot" style="background:rgba(180,100,220,1)"></div>
    <div class="capa-info">
      <span class="capa-nombre">avistamientos cetáceos</span>
      <span class="capa-estado" id="est-avistamientos">cargando…</span>

  </div>
</div>

<!-- panel info al click -->
<div id="info-panel">
  <button id="info-cerrar" onclick="cerrarInfo()">×</button>
  <div id="info-tipo"></div>
  <div id="info-nombre"></div>
  <div id="info-datos"></div>
</div>

<div id="stats">
  <div class="stat-row" id="stat-barcos"></div>
  <div class="stat-row" id="stat-animales"></div>
  <div class="stat-row" id="stat-sismos-n"></div>
</div>

<div id="hint">click sobre cualquier elemento para más información</div>

<script>
const AIS_KEY = 'f233b8fe03520713d0d9f0b013e79324a5195365'

// Estudios Movebank
const MB_ESTUDIOS = [
  { id:'5161274049', tipo:'ballena', especie:'Megaptera novaeangliae', nombre:'jorobada Pacífico' },
  { id:'446603',     tipo:'ave',     especie:'Puffinus creatopus',     nombre:'pardela patas rosadas' },
  { id:'5549752586', tipo:'ave',     especie:'Sula variegata',         nombre:'piquero peruano' },
  { id:'5371230531', tipo:'ave',     especie:'Spheniscus humboldti',   nombre:'pingüino de Humboldt' },
  { id:'2911040',    tipo:'ave',     especie:'Phoebastria irrorata',   nombre:'albatros de Galápagos' },
]

// Estudios tortugas en Movebank
const MB_TORTUGAS = [
  { id:'492444603',  tipo:'tortuga', especie:'Chelonia mydas',         nombre:'tortuga verde Pacífico' },
  { id:'1381110575', tipo:'tortuga', especie:'Numenius tahitiensis',   nombre:'Kivi Kuaka — centinelas de tsunamis' },
]

const capasOn = { barcos:true, ballenas:true, aves:true, tortugas:true, sismos:true, temp:false, avistamientos:true }

function toggle(n) {
  capasOn[n] = !capasOn[n]
  document.getElementById('capa-'+n).classList.toggle('off', !capasOn[n])
}

// ── DATOS ─────────────────────────────────────────────────────────
const barcos = new Map()    // mmsi → {lat,lon,heading,speed,shipType,flag,nombre,updated}
const animales = []          // {lats,lons,tipo,especie,nombreEstudio,individuoId,lastDate}
const sismos = []            // {lat,lon,mag,lugar,time}
const avistamientos = []     // {lat,lon,especie,fecha,n}

let aisWs = null
let t = 0
let objetoHover = null
let cargando = 3  // contador de cargas pendientes

const cvs = document.getElementById('c')
const ctx = cvs.getContext('2d')

// ── PROYECCIÓN ────────────────────────────────────────────────────
function proy(lat, lon) {
  const x = ((lon + 180) / 360) * cvs.width
  const latRad = Math.min(Math.max(lat, -85), 85) * Math.PI / 180
  const mercN = Math.log(Math.tan(Math.PI / 4 + latRad / 2))
  return [x, (0.5 - mercN / (2 * Math.PI)) * cvs.height]
}

function invProy(px, py) {
  const lon = (px / cvs.width) * 360 - 180
  const mercN = (0.5 - py / cvs.height) * 2 * Math.PI
  const lat = (2 * Math.atan(Math.exp(mercN)) - Math.PI / 2) * 180 / Math.PI
  return [lat, lon]
}

// ── AIS ───────────────────────────────────────────────────────────
const SHIP_TYPES = {
  0:'desconocido', 1:'reservado', 20:'WIG', 21:'WIG peligroso',
  30:'pesca', 31:'remolcador', 32:'remolcador', 33:'dragas',
  34:'buceo', 35:'militar', 36:'navegación a vela', 37:'embarcación deportiva',
  40:'HSC', 50:'piloto', 51:'SAR', 52:'remolcador', 53:'porteo',
  60:'pasajeros', 61:'pasajeros', 62:'pasajeros', 63:'pasajeros',
  70:'carga', 71:'carga', 72:'carga', 73:'carga', 74:'carga',
  80:'tanquero', 81:'tanquero', 82:'tanquero', 83:'tanquero', 84:'tanquero',
  90:'otro', 91:'otro', 92:'otro', 93:'otro', 94:'otro',
}

function tipoBarco(t) { return SHIP_TYPES[Math.floor(t/10)*10] || SHIP_TYPES[t] || 'desconocido' }

function conectarAIS() {
  if (aisWs) aisWs.close()
  aisWs = new WebSocket('wss://stream.aisstream.io/v0/stream')
  aisWs.onopen = () => {
    document.getElementById('est-barcos').textContent = 'conectado'
    aisWs.send(JSON.stringify({
      APIKey: AIS_KEY,
      BoundingBoxes: [[[-85,-180],[85,180]]],
      FilterMessageTypes: ['PositionReport', 'ShipStaticData']
    }))
  }
  aisWs.onmessage = async (e) => {
    try {
      const text = typeof e.data === 'string' ? e.data : await e.data.text()
      const msg = JSON.parse(text)
      if (msg.MessageType === 'PositionReport') {
        const pos = msg.Message?.PositionReport; if (!pos) return
        const lat=pos.Latitude, lon=pos.Longitude
        if (!lat||!lon||lat===0||lon===0) return
        const existing = barcos.get(pos.UserId) || {}
        barcos.set(pos.UserId, {
          ...existing,
          lat, lon,
          heading: pos.TrueHeading||pos.CourseOverGround||0,
          speed: pos.SpeedOverGround||0,
          updated: Date.now()
        })
      } else if (msg.MessageType === 'ShipStaticData') {
        const sd = msg.Message?.ShipStaticData; if (!sd) return
        const existing = barcos.get(sd.UserId) || {}
        barcos.set(sd.UserId, {
          ...existing,
          nombre: sd.Name?.trim()||'',
          shipType: sd.Type||0,
          flag: sd.ImoNumber||'',
          callSign: sd.CallSign?.trim()||'',
          updated: existing.updated||Date.now()
        })
      }
      // limpiar viejos
      const ahora = Date.now()
      barcos.forEach((v,k) => { if(ahora-v.updated>600000) barcos.delete(k) })
      document.getElementById('est-barcos').textContent = `${barcos.size} activos`
      document.getElementById('stat-barcos').textContent = `${barcos.size} barcos`
    } catch(e) {}
  }
  aisWs.onclose = () => {
    document.getElementById('est-barcos').textContent = 'reconectando…'
    setTimeout(conectarAIS, 10000)
  }
}

// ── MOVEBANK ──────────────────────────────────────────────────────
async function cargarMovebank(estudios, tipo) {
  for (const est of estudios) {
    try {
      const url = `/.netlify/functions/movebank?study_id=${est.id}`
      const res = await fetch(url); if (!res.ok) continue
      const csv = await res.text()
      const lineas = csv.trim().split('\n'); if (lineas.length < 2) continue
      const h = lineas[0].split(',').map(x=>x.replace(/"/g,'').trim())
      const iLat=h.indexOf('location-lat'), iLon=h.indexOf('location-long')
      const iId=h.indexOf('individual-local-identifier'), iTs=h.indexOf('timestamp')
      if (iLat<0||iLon<0) continue
      const ind = new Map()
      for (let i=1; i<lineas.length; i++) {
        const c=lineas[i].split(',')
        const lat=parseFloat(c[iLat]), lon=parseFloat(c[iLon])
        const id=c[iId]?.replace(/"/g,'')||'x'
        const ts=c[iTs]?.replace(/"/g,'')||''
        if (isNaN(lat)||isNaN(lon)) continue
        if (!ind.has(id)) ind.set(id, {locs:[], lastDate:ts})
        ind.get(id).locs.push({lat,lon})
        if (ts > ind.get(id).lastDate) ind.get(id).lastDate = ts
      }
      ind.forEach((data, id) => {
        if (data.locs.length < 2) return
        animales.push({
          lats: data.locs.map(l=>l.lat),
          lons: data.locs.map(l=>l.lon),
          tipo: est.tipo,
          especie: est.especie,
          nombreEstudio: est.nombre,
          individuoId: id,
          lastDate: data.lastDate,
          animOffset: Math.random()
        })
      })
      const clave = est.tipo === 'ballena' ? 'ballenas' : est.tipo === 'tortuga' ? 'tortugas' : 'aves'
      const n = animales.filter(a=>a.tipo===est.tipo).length
      document.getElementById('est-'+clave).textContent = `${n} individuos`
    } catch(e) {}
  }
  reducirCargando()
}

// ── SISMOS USGS ───────────────────────────────────────────────────
async function cargarSismos() {
  try {
    const url = 'https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/2.5_week.geojson'
    const res = await fetch(url); if (!res.ok) return
    const geo = await res.json()
    geo.features?.forEach(f => {
      const[lon,lat,dep] = f.geometry.coordinates
      sismos.push({
        lat, lon, dep,
        mag: f.properties.mag,
        lugar: f.properties.place,
        time: new Date(f.properties.time).toLocaleDateString('es-CL')
      })
    })
    document.getElementById('est-sismos').textContent = `${sismos.length} últimos 7 días`
    document.getElementById('stat-sismos-n').textContent = `${sismos.length} sismos M2.5+`
  } catch(e) {
    document.getElementById('est-sismos').textContent = 'error'
  }
  reducirCargando()
}

// ── AVISTAMIENTOS OBIS-SEAMAP ─────────────────────────────────────
async function cargarAvistamientos() {
  try {
    // OBIS API — cetáceos en el Pacífico sur
    const url = 'https://api.obis.org/v3/occurrence?taxonid=2688&geometry=POLYGON((-180%20-60,-60%20-60,-60%2030,-180%2030,-180%20-60))&size=200'
    const res = await fetch(url); if (!res.ok) return
    const data = await res.json()
    data.results?.forEach(r => {
      if (!r.decimalLatitude||!r.decimalLongitude) return
      avistamientos.push({
        lat: r.decimalLatitude,
        lon: r.decimalLongitude,
        especie: r.scientificName||'cetáceo',
        fecha: r.eventDate||'',
        dataset: r.datasetName||''
      })
    })
    document.getElementById('est-avistamientos').textContent = `${avistamientos.length} registros`
  } catch(e) {
    document.getElementById('est-avistamientos').textContent = 'sin datos'
  }
  reducirCargando()
}

function reducirCargando() {
  cargando--
  if (cargando <= 0) {
    document.getElementById('loading').classList.add('oculto')
  }
}

// ── RENDER ────────────────────────────────────────────────────────
function redim() {
  cvs.width = window.innerWidth * devicePixelRatio
  cvs.height = window.innerHeight * devicePixelRatio
  cvs.style.width = window.innerWidth + 'px'
  cvs.style.height = window.innerHeight + 'px'
}

function frame() {
  t += 0.004
  ctx.clearRect(0, 0, cvs.width, cvs.height)

  // fondo radial sutil
  const g = ctx.createRadialGradient(cvs.width/2,cvs.height/2,0,cvs.width/2,cvs.height/2,cvs.width*.7)
  g.addColorStop(0,'rgba(10,18,45,0.4)'); g.addColorStop(1,'rgba(5,8,16,0)')
  ctx.fillStyle=g; ctx.fillRect(0,0,cvs.width,cvs.height)

  // ── AVISTAMIENTOS ──
  if (capasOn.avistamientos) {
    avistamientos.forEach(a => {
      const [x,y] = proy(a.lat, a.lon)
      ctx.beginPath(); ctx.arc(x,y,3*devicePixelRatio,0,Math.PI*2)
      ctx.fillStyle = 'rgba(180,100,220,0.4)'; ctx.fill()
      // pulso
      const pulse = (Math.sin(t*2+a.lat)*0.5+0.5)
      ctx.beginPath(); ctx.arc(x,y,(3+pulse*4)*devicePixelRatio,0,Math.PI*2)
      ctx.strokeStyle = 'rgba(180,100,220,0.1)'; ctx.lineWidth=1*devicePixelRatio; ctx.stroke()
    })
  }

  // ── SISMOS ──
  if (capasOn.sismos) {
    sismos.forEach(s => {
      const [x,y] = proy(s.lat, s.lon)
      const r = Math.max(2, s.mag * 2) * devicePixelRatio
      // círculo exterior pulsante
      const pulse = (Math.sin(t*1.5+s.lon)*0.5+0.5)
      ctx.beginPath(); ctx.arc(x,y,r*(1+pulse*.8),0,Math.PI*2)
      ctx.strokeStyle = `rgba(220,80,80,${0.08+pulse*0.08})`
      ctx.lineWidth = 1*devicePixelRatio; ctx.stroke()
      // punto
      ctx.beginPath(); ctx.arc(x,y,r*.5,0,Math.PI*2)
      ctx.fillStyle = `rgba(220,80,80,${0.4+s.mag/10})`; ctx.fill()
    })
  }

  // ── TRACKS ANIMALES ──
  const tiposAnimal = [
    { tipo:'ballena',  col:'rgba(100,160,220,', capa:'ballenas',  r:3 },
    { tipo:'ave',      col:'rgba(150,220,150,', capa:'aves',      r:1.8 },
    { tipo:'tortuga',  col:'rgba(220,180,80,',  capa:'tortugas',  r:2.5 },
  ]

  tiposAnimal.forEach(({ tipo, col, capa, r }) => {
    if (!capasOn[capa]) return
    animales.filter(a=>a.tipo===tipo).forEach(a => {
      if (a.lats.length < 2) return
      // track
      ctx.beginPath()
      const [x0,y0] = proy(a.lats[0], a.lons[0]); ctx.moveTo(x0,y0)
      for (let i=1; i<a.lats.length; i++) {
        const [xi,yi] = proy(a.lats[i], a.lons[i]); ctx.lineTo(xi,yi)
      }
      ctx.strokeStyle = col+'0.12)'; ctx.lineWidth=.6*devicePixelRatio
      ctx.setLineDash([]); ctx.stroke()
      // punto animado
      const prog = ((t*.06 + a.animOffset) % 1)
      const idx = Math.floor(prog*(a.lats.length-1))
      const frac = (prog*(a.lats.length-1)) - idx
      const [ax,ay] = proy(a.lats[idx], a.lons[idx])
      const [bx,by] = proy(
        a.lats[Math.min(idx+1,a.lats.length-1)],
        a.lons[Math.min(idx+1,a.lons.length-1)]
      )
      const px=ax+(bx-ax)*frac, py=ay+(by-ay)*frac
      // halo
      ctx.beginPath(); ctx.arc(px,py,r*2*devicePixelRatio,0,Math.PI*2)
      ctx.fillStyle=col+'0.08)'; ctx.fill()
      // punto
      ctx.beginPath(); ctx.arc(px,py,r*devicePixelRatio,0,Math.PI*2)
      ctx.fillStyle=col+'0.8)'; ctx.fill()
    })
  })

  // ── BARCOS AIS ──
  if (capasOn.barcos) {
    const ahora = Date.now()
    barcos.forEach(b => {
      if (!b.lat||!b.lon) return
      const [bx,by] = proy(b.lat, b.lon)
      const edad = (ahora-b.updated)/60000
      const alpha = Math.max(.05, .35-edad*.05)
      // estela
      if (b.heading && b.heading<360) {
        const rad=(b.heading-90)*Math.PI/180, len=8*devicePixelRatio
        ctx.beginPath(); ctx.moveTo(bx,by)
        ctx.lineTo(bx+Math.cos(rad)*len, by+Math.sin(rad)*len)
        ctx.strokeStyle=`rgba(180,160,100,${alpha*.4})`
        ctx.lineWidth=.5*devicePixelRatio; ctx.stroke()
      }
      // punto
      ctx.beginPath(); ctx.arc(bx,by,1.8*devicePixelRatio,0,Math.PI*2)
      ctx.fillStyle=`rgba(180,160,100,${alpha})`; ctx.fill()
    })
  }

  // stat animales
  const nAnim = animales.length
  if (nAnim > 0) document.getElementById('stat-animales').textContent = `${nAnim} individuos rastreados`

  requestAnimationFrame(frame)
}

// ── INTERACCIÓN ───────────────────────────────────────────────────
function buscarElemento(px, py) {
  const radio = 12 * devicePixelRatio

  // barcos
  if (capasOn.barcos) {
    let encontrado = null
    barcos.forEach((b, mmsi) => {
      if (!b.lat||!b.lon) return
      const [bx,by] = proy(b.lat, b.lon)
      if (Math.hypot(px-bx, py-by) < radio) encontrado = { tipo:'barco', mmsi, ...b }
    })
    if (encontrado) return encontrado
  }

  // animales
  const tiposA = capasOn.ballenas||capasOn.aves||capasOn.tortugas
  if (tiposA) {
    for (const a of animales) {
      const capa = a.tipo==='ballena'?'ballenas':a.tipo==='tortuga'?'tortugas':'aves'
      if (!capasOn[capa]) continue
      const prog = ((t*.06+a.animOffset)%1)
      const idx = Math.floor(prog*(a.lats.length-1))
      const frac = (prog*(a.lats.length-1))-idx
      const [ax,ay]=proy(a.lats[idx],a.lons[idx])
      const [bx,by]=proy(a.lats[Math.min(idx+1,a.lats.length-1)],a.lons[Math.min(idx+1,a.lons.length-1)])
      const px2=ax+(bx-ax)*frac, py2=ay+(by-ay)*frac
      if (Math.hypot(px-px2, py-py2) < radio*1.5) return { tipo:'animal', ...a }
    }
  }

  // sismos
  if (capasOn.sismos) {
    for (const s of sismos) {
      const [sx,sy] = proy(s.lat, s.lon)
      if (Math.hypot(px-sx, py-sy) < Math.max(radio, s.mag*2*devicePixelRatio)) return { tipo:'sismo', ...s }
    }
  }

  // avistamientos
  if (capasOn.avistamientos) {
    for (const a of avistamientos) {
      const [ax,ay] = proy(a.lat, a.lon)
      if (Math.hypot(px-ax, py-ay) < radio) return { tipo:'avistamiento', ...a }
    }
  }

  return null
}

function mostrarInfo(el) {
  if (!el) { cerrarInfo(); return }
  const panel = document.getElementById('info-panel')
  const tipo = document.getElementById('info-tipo')
  const nombre = document.getElementById('info-nombre')
  const datos = document.getElementById('info-datos')

  panel.classList.add('visible')
  datos.innerHTML = ''

  const fila = (k,v) => {
    if (!v && v!==0) return
    const d = document.createElement('div'); d.className='info-fila'
    d.innerHTML=`<span class="info-key">${k}</span><span class="info-val">${v}</span>`
    datos.appendChild(d)
  }

  if (el.tipo === 'barco') {
    tipo.textContent = 'embarcación'
    nombre.textContent = el.nombre||`MMSI ${el.mmsi}`
    fila('tipo', tipoBarco(el.shipType||0))
    fila('velocidad', el.speed ? `${el.speed.toFixed(1)} nudos` : null)
    fila('rumbo', el.heading&&el.heading<360 ? `${Math.round(el.heading)}°` : null)
    fila('callsign', el.callSign||null)
    fila('mmsi', el.mmsi)
    fila('última señal', el.updated ? new Date(el.updated).toLocaleTimeString('es-CL') : null)

  } else if (el.tipo === 'animal') {
    tipo.textContent = el.tipo
    nombre.textContent = el.especie
    fila('individuo', el.individuoId)
    fila('estudio', el.nombreEstudio)
    fila('última posición', el.lastDate?.slice(0,10)||null)
    fila('puntos rastreados', el.lats?.length)

  } else if (el.tipo === 'sismo') {
    tipo.textContent = `sismo M${el.mag}`
    nombre.textContent = el.lugar
    fila('magnitud', el.mag)
    fila('profundidad', el.dep ? `${Math.round(el.dep)} km` : null)
    fila('fecha', el.time)
    fila('lat / lon', `${el.lat.toFixed(2)}, ${el.lon.toFixed(2)}`)

  } else if (el.tipo === 'avistamiento') {
    tipo.textContent = 'avistamiento'
    nombre.textContent = el.especie
    fila('fecha', el.fecha?.slice(0,10)||null)
    fila('fuente', el.dataset||null)
    fila('lat / lon', `${el.lat.toFixed(2)}, ${el.lon.toFixed(2)}`)
  }
}

function cerrarInfo() {
  document.getElementById('info-panel').classList.remove('visible')
}

function coordsCanvas(e) {
  const r = cvs.getBoundingClientRect()
  const touch = e.touches?.[0]||e
  return [
    (touch.clientX-r.left)*devicePixelRatio,
    (touch.clientY-r.top)*devicePixelRatio
  ]
}

cvs.addEventListener('mousemove', e => {
  const [px,py] = coordsCanvas(e)
  const el = buscarElemento(px,py)
  cvs.style.cursor = el ? 'pointer' : 'default'
})

cvs.addEventListener('click', e => {
  const [px,py] = coordsCanvas(e)
  const el = buscarElemento(px,py)
  mostrarInfo(el)
})

cvs.addEventListener('touchstart', e => {
  const [px,py] = coordsCanvas(e)
  const el = buscarElemento(px,py)
  mostrarInfo(el)
}, { passive:true })

window.addEventListener('resize', redim)

// ── INICIO ────────────────────────────────────────────────────────
redim()
frame()
conectarAIS()

// cargar en paralelo — cada uno llama reducirCargando al terminar
cargarMovebank(MB_ESTUDIOS, 'animales')
cargarMovebank(MB_TORTUGAS, 'tortugas')
cargarSismos()
cargarAvistamientos()

// temp superficial — pendiente implementación NOAA
document.getElementById('est-temp').textContent = 'próximamente'
</script>
