<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NùN — trayectoria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@200;300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --bg:#050810; }
body { background:var(--bg); font-family:'Inter',sans-serif; overflow:hidden; width:100vw; height:100vh; color:rgba(255,255,255,.7); }
canvas { position:fixed; inset:0; width:100%; height:100%; }

#nav {
  position:fixed; top:1.8rem; left:2rem; right:2rem;
  display:flex; align-items:center; justify-content:space-between; z-index:100;
}
#nav-titulo {
  font-family:'Barlow Condensed',sans-serif; font-size:1.2rem;
  font-weight:200; letter-spacing:.4em; color:rgba(255,255,255,.6);
  text-decoration:none; text-transform:lowercase;
}
#nav-titulo span { color:rgba(255,255,255,.25); }
#nav-links { display:flex; gap:2rem; }
#nav-links a {
  color:rgba(255,255,255,.2); text-decoration:none; font-size:.6rem;
  letter-spacing:.35em; text-transform:lowercase; transition:color .4s; font-weight:300;
}
#nav-links a:hover { color:rgba(255,255,255,.6); }
#nav-links a.activo { color:rgba(255,255,255,.6); }

#capas {
  position:fixed; top:5rem; left:2rem;
  display:flex; flex-direction:column; gap:.5rem; z-index:100;
}
.capa {
  display:flex; align-items:center; gap:.6rem;
  cursor:pointer; user-select:none; transition:opacity .3s;
}
.capa.off { opacity:.2; }
.capa:hover { opacity:1 !important; }
.capa-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; transition:transform .3s; }
.capa.off .capa-dot { transform:scale(.6); }
.capa-info { display:flex; flex-direction:column; gap:.15rem; }
.capa-nombre { font-size:.5rem; letter-spacing:.28em; text-transform:lowercase; color:rgba(255,255,255,.8); font-weight:300; }
.capa-estado { font-size:.38rem; letter-spacing:.2em; color:rgba(255,255,255,.25); font-weight:300; }
.capa-sep { height:1px; background:rgba(255,255,255,.06); margin:.2rem 0; }

#info-panel {
  position:fixed; top:50%; right:2rem; transform:translateY(-50%);
  width:260px; background:rgba(5,8,16,.95);
  border:1px solid rgba(255,255,255,.06);
  padding:1.5rem; z-index:100;
  opacity:0; pointer-events:none; transition:opacity .4s;
}
#info-panel.visible { opacity:1; pointer-events:all; }
#info-cerrar {
  position:absolute; top:.8rem; right:.8rem;
  background:none; border:none; color:rgba(255,255,255,.3);
  cursor:pointer; font-size:1rem; transition:color .3s;
}
#info-cerrar:hover { color:white; }
#info-tipo { font-size:.42rem; letter-spacing:.35em; text-transform:lowercase; color:rgba(255,255,255,.3); margin-bottom:.8rem; font-weight:300; }
#info-nombre { font-family:'Barlow Condensed',sans-serif; font-size:1.4rem; font-weight:300; letter-spacing:.1em; color:white; margin-bottom:1rem; line-height:1.1; }
#info-datos { display:flex; flex-direction:column; gap:.5rem; }
.info-fila { display:flex; justify-content:space-between; align-items:flex-start; border-bottom:1px solid rgba(255,255,255,.04); padding-bottom:.4rem; }
.info-key { font-size:.45rem; letter-spacing:.2em; color:rgba(255,255,255,.3); font-weight:300; text-transform:lowercase; }
.info-val { font-size:.5rem; letter-spacing:.1em; color:rgba(255,255,255,.7); font-weight:300; text-align:right; max-width:55%; }

#stats {
  position:fixed; bottom:1.8rem; right:2rem;
  display:flex; flex-direction:column; gap:.3rem; align-items:flex-end;
  z-index:100; opacity:.4;
}
.stat-row { font-size:.42rem; letter-spacing:.2em; color:rgba(255,255,255,.6); font-weight:300; }

#loading {
  position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
  z-index:200; background:var(--bg); transition:opacity 1s ease;
}
#loading.oculto { opacity:0; pointer-events:none; }
#loading-txt {
  font-family:'Barlow Condensed',sans-serif; font-size:1rem;
  letter-spacing:.4em; color:rgba(255,255,255,.3); text-transform:lowercase;
  animation:pulsar 2s ease infinite;
}
@keyframes pulsar { 0%,100%{opacity:.3} 50%{opacity:.8} }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="loading"><div id="loading-txt">cargando datos</div></div>

<div id="nav">
  <a href="/" id="nav-titulo">NùN <span>/ trayectoria</span></a>
  <div id="nav-links">
    <a href="/">mapa</a>
    <a href="/trayectoria.html" class="activo">trayectoria</a>
  </div>
</div>

<div id="capas">
  <div class="capa" id="capa-barcos" onclick="toggle('barcos')">
    <div class="capa-dot" style="background:rgba(180,160,100,1)"></div>
    <div class="capa-info">
      <span class="capa-nombre">tráfico marítimo</span>
      <span class="capa-estado" id="est-barcos">conectando…</span>
    </div>
  </div>
  <div class="capa-sep"></div>
  <div class="capa" id="capa-ballenas" onclick="toggle('ballenas')">
    <div class="capa-dot" style="background:rgba(100,160,220,1)"></div>
    <div class="capa-info">
      <span class="capa-nombre">ballenas</span>
      <span class="capa-estado" id="est-ballenas">cargando…</span>
    </div>
  </div>
  <div class="capa" id="capa-aves" onclick="toggle('aves')">
    <div class="capa-dot" style="background:rgba(150,220,150,1)"></div>
    <div class="capa-info">
      <span class="capa-nombre">aves migratorias</span>
      <span class="capa-estado" id="est-aves">cargando…</span>
    </div>
  </div>
  <div class="capa" id="capa-tortugas" onclick="toggle('tortugas')">
    <div class="capa-dot" style="background:rgba(220,180,80,1)"></div>
    <div class="capa-info">
      <span class="capa-nombre">tortugas marinas</span>
      <span class="capa-estado" id="est-tortugas">cargando…</span>
    </div>
  </div>
  <div class="capa-sep"></div>
  <div class="capa" id="capa-sismos" onclick="toggle('sismos')">
    <div class="capa-dot" style="background:rgba(220,80,80,1)"></div>
    <div class="capa-info">
      <span class="capa-nombre">sismos (USGS)</span>
      <span class="capa-estado" id="est-sismos">cargando…</span>
    </div>
  </div>
  <div class="capa" id="capa-avistamientos" onclick="toggle('avistamientos')">
    <div class="capa-dot" style="background:rgba(180,100,220,1)"></div>
    <div class="capa-info">
      <span class="capa-nombre">avistamientos cetáceos</span>
      <span class="capa-estado" id="est-avistamientos">cargando…</span>
    </div>
  </div>
</div>

<div id="info-panel">
  <button id="info-cerrar" onclick="cerrarInfo()">×</button>
  <div id="info-tipo"></div>
  <div id="info-nombre"></div>
  <div id="info-datos"></div>
</div>

<div id="stats">
  <div class="stat-row" id="stat-barcos"></div>
  <div class="stat-row" id="stat-animales"></div>
  <div class="stat-row" id="stat-sismos-n"></div>
</div>

<script>
const AIS_KEY = 'f233b8fe03520713d0d9f0b013e79324a5195365'

const MB_ESTUDIOS = [
  { id:'5161274049', tipo:'ballena', especie:'Megaptera novaeangliae', nombre:'jorobada Pacífico' },
  { id:'446603',     tipo:'ave',     especie:'Puffinus creatopus',     nombre:'pardela patas rosadas' },
  { id:'5549752586', tipo:'ave',     especie:'Sula variegata',         nombre:'piquero peruano' },
  { id:'5371230531', tipo:'ave',     especie:'Spheniscus humboldti',   nombre:'pingüino de Humboldt' },
  { id:'2911040',    tipo:'ave',     especie:'Phoebastria irrorata',   nombre:'albatros de Galápagos' },
  { id:'492444603',  tipo:'tortuga', especie:'Chelonia mydas',         nombre:'tortuga verde Pacífico' },
  { id:'1381110575', tipo:'tortuga', especie:'Numenius tahitiensis',   nombre:'Kivi Kuaka' },
]

const capasOn = { barcos:true, ballenas:true, aves:true, tortugas:true, sismos:true, avistamientos:true }
function toggle(n) {
  capasOn[n]=!capasOn[n]
  document.getElementById('capa-'+n).classList.toggle('off',!capasOn[n])
}

const SHIP_TYPES = {
  30:'pesca', 31:'remolcador', 32:'remolcador', 36:'navegación a vela',
  37:'embarcación deportiva', 50:'piloto', 51:'SAR', 52:'remolcador',
  60:'pasajeros', 70:'carga', 80:'tanquero', 90:'otro'
}
function tipoBarco(t){ return SHIP_TYPES[Math.floor(t/10)*10]||SHIP_TYPES[t]||'embarcación' }

// ── DATOS ─────────────────────────────────────────────────────────
// barcos: mmsi → {lat,lon,heading,speed,nombre,shipType,callSign,updated,renderX,renderY}
const barcos = new Map()
const animales = []
const sismos = []
const avistamientos = []

let aisWs = null
let t = 0
let hoverEl = null
let pendientes = 4

const cvs = document.getElementById('c')
const ctx = cvs.getContext('2d')

// ── PROYECCIÓN centrada en meridiano 0 ────────────────────────────
// Lon 0 queda en el centro horizontal
function proy(lat, lon) {
  // normalizar lon entre -180 y 180
  let lo = ((lon + 180) % 360 + 360) % 360 - 180
  const x = (lo / 360 + 0.5) * cvs.width
  const latRad = Math.min(Math.max(lat,-85),85) * Math.PI / 180
  const mercN = Math.log(Math.tan(Math.PI/4 + latRad/2))
  const y = (0.5 - mercN/(2*Math.PI)) * cvs.height
  return [x, y]
}

// ── AIS ───────────────────────────────────────────────────────────
function conectarAIS() {
  if (aisWs) aisWs.close()
  aisWs = new WebSocket('wss://stream.aisstream.io/v0/stream')
  aisWs.onopen = () => {
    document.getElementById('est-barcos').textContent = 'conectado'
    aisWs.send(JSON.stringify({
      APIKey: AIS_KEY,
      BoundingBoxes: [[[-85,-180],[85,180]]],
      FilterMessageTypes: ['PositionReport','ShipStaticData']
    }))
  }
  aisWs.onmessage = async (e) => {
    try {
      const text = typeof e.data==='string' ? e.data : await e.data.text()
      const msg = JSON.parse(text)
      if (msg.MessageType === 'PositionReport') {
        const pos = msg.Message?.PositionReport; if (!pos) return
        const lat=pos.Latitude, lon=pos.Longitude
        if (!lat||!lon||lat===0||lon===0) return
        const ex = barcos.get(pos.UserId)||{}
        const speedKnots = pos.SpeedOverGround||0
        const heading = pos.TrueHeading||pos.CourseOverGround||0
        barcos.set(pos.UserId, {
          ...ex, lat, lon, heading, speed: speedKnots,
          // posición interpolada empieza igual
          renderLat: ex.renderLat||lat,
          renderLon: ex.renderLon||lon,
          updated: Date.now()
        })
      } else if (msg.MessageType === 'ShipStaticData') {
        const sd = msg.Message?.ShipStaticData; if (!sd) return
        const ex = barcos.get(sd.UserId)||{}
        barcos.set(sd.UserId, { ...ex,
          nombre: sd.Name?.trim()||'',
          shipType: sd.Type||0,
          callSign: sd.CallSign?.trim()||'',
          updated: ex.updated||Date.now()
        })
      }
      const ahora=Date.now()
      barcos.forEach((v,k)=>{ if(ahora-v.updated>900000) barcos.delete(k) })
      document.getElementById('est-barcos').textContent=`${barcos.size} activos`
      document.getElementById('stat-barcos').textContent=`${barcos.size} barcos`
    } catch(e){}
  }
  aisWs.onclose = () => {
    document.getElementById('est-barcos').textContent='reconectando…'
    setTimeout(conectarAIS, 10000)
  }
}

// Interpolar posición de barcos entre updates usando velocidad y rumbo
function interpolarBarcos(dt) {
  const KN_TO_DEG_PER_S = 1/3600 * (1/60) // nudos → grados/s aprox
  barcos.forEach(b => {
    if (!b.lat||!b.lon) return
    if (!b.renderLat) { b.renderLat=b.lat; b.renderLon=b.lon; return }
    // mover renderLat/renderLon suavemente hacia lat/lon real
    const speed = b.speed||0
    const heading = b.heading||0
    if (speed > 0.5 && speed < 50) {
      const rad = (heading - 90) * Math.PI / 180
      const dist = speed * KN_TO_DEG_PER_S * dt * 1000 // dt en segundos
      b.renderLon += Math.cos(rad) * dist * 0.8
      b.renderLat += Math.sin(rad) * dist * (-0.4)
    }
    // snap suave hacia posición real
    b.renderLat += (b.lat - b.renderLat) * 0.02
    b.renderLon += (b.lon - b.renderLon) * 0.02
  })
}

// ── MOVEBANK ──────────────────────────────────────────────────────
async function cargarMovebank() {
  for (const est of MB_ESTUDIOS) {
    try {
      const res = await fetch(`/.netlify/functions/movebank?study_id=${est.id}`)
      if (!res.ok) continue
      const csv = await res.text()
      const lineas = csv.trim().split('\n'); if (lineas.length<2) continue
      const h = lineas[0].split(',').map(x=>x.replace(/"/g,'').trim())
      const iLat=h.indexOf('location-lat'), iLon=h.indexOf('location-long')
      const iId=h.indexOf('individual-local-identifier'), iTs=h.indexOf('timestamp')
      if (iLat<0||iLon<0) continue
      const ind = new Map()
      for (let i=1; i<lineas.length; i++) {
        const c=lineas[i].split(',')
        const lat=parseFloat(c[iLat]), lon=parseFloat(c[iLon])
        const id=c[iId]?.replace(/"/g,'')||'x', ts=c[iTs]?.replace(/"/g,'')||''
        if (isNaN(lat)||isNaN(lon)) continue
        if (!ind.has(id)) ind.set(id,{locs:[],lastDate:ts})
        ind.get(id).locs.push({lat,lon})
        if (ts>ind.get(id).lastDate) ind.get(id).lastDate=ts
      }
      ind.forEach((data,id)=>{
        if (data.locs.length<2) return
        animales.push({
          lats:data.locs.map(l=>l.lat), lons:data.locs.map(l=>l.lon),
          tipo:est.tipo, especie:est.especie, nombreEstudio:est.nombre,
          individuoId:id, lastDate:data.lastDate, animOffset:Math.random()
        })
      })
      const k = est.tipo==='ballena'?'ballenas':est.tipo==='tortuga'?'tortugas':'aves'
      document.getElementById('est-'+k).textContent=`${animales.filter(a=>a.tipo===est.tipo).length} individuos`
    } catch(e){}
  }
  document.getElementById('stat-animales').textContent=`${animales.length} individuos rastreados`
  reducir()
}

// ── SISMOS ────────────────────────────────────────────────────────
async function cargarSismos() {
  try {
    const res = await fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/2.5_week.geojson')
    if (!res.ok) return
    const geo = await res.json()
    geo.features?.forEach(f=>{
      const [lon,lat,dep]=f.geometry.coordinates
      sismos.push({lat,lon,dep,mag:f.properties.mag,lugar:f.properties.place,time:new Date(f.properties.time).toLocaleDateString('es-CL')})
    })
    document.getElementById('est-sismos').textContent=`${sismos.length} últimos 7 días`
    document.getElementById('stat-sismos-n').textContent=`${sismos.length} sismos M2.5+`
  } catch(e){ document.getElementById('est-sismos').textContent='error' }
  reducir()
}

// ── AVISTAMIENTOS ─────────────────────────────────────────────────
async function cargarAvistamientos() {
  try {
    const res = await fetch('https://api.obis.org/v3/occurrence?taxonid=2688&size=300&fields=decimalLatitude,decimalLongitude,scientificName,eventDate,datasetName')
    if (!res.ok) return
    const data = await res.json()
    data.results?.forEach(r=>{
      if (!r.decimalLatitude||!r.decimalLongitude) return
      avistamientos.push({lat:r.decimalLatitude,lon:r.decimalLongitude,especie:r.scientificName||'cetáceo',fecha:r.eventDate||'',dataset:r.datasetName||''})
    })
    document.getElementById('est-avistamientos').textContent=`${avistamientos.length} registros`
  } catch(e){ document.getElementById('est-avistamientos').textContent='sin datos' }
  reducir()
}

let _pendientes = 3
function reducir() { _pendientes--; if (_pendientes<=0) document.getElementById('loading').classList.add('oculto') }

// ── DIBUJAR TRIÁNGULO ─────────────────────────────────────────────
function dibujarBarco(x, y, heading, alpha, size, isHover) {
  const rad = (heading - 90) * Math.PI / 180
  const s = size * devicePixelRatio

  ctx.save()
  ctx.translate(x, y)
  ctx.rotate(rad)

  if (isHover) {
    // aureola pulsante solo en hover
    const pulse = (Math.sin(t * 3) * 0.5 + 0.5)
    ctx.beginPath()
    ctx.arc(0, 0, s * (2.5 + pulse * 1.5), 0, Math.PI * 2)
    ctx.strokeStyle = `rgba(180,160,100,${0.15 + pulse * 0.2})`
    ctx.lineWidth = 1 * devicePixelRatio
    ctx.stroke()
    ctx.beginPath()
    ctx.arc(0, 0, s * (1.5 + pulse * 0.8), 0, Math.PI * 2)
    ctx.strokeStyle = `rgba(180,160,100,${0.1 + pulse * 0.15})`
    ctx.lineWidth = 0.5 * devicePixelRatio
    ctx.stroke()
  }

  // triángulo apuntando hacia adelante (arriba antes de rotar)
  ctx.beginPath()
  ctx.moveTo(0, -s * 1.6)      // punta delantera
  ctx.lineTo(-s * 0.7, s * 0.9) // esquina trasera izquierda
  ctx.lineTo(0, s * 0.4)        // muesca trasera central
  ctx.lineTo(s * 0.7, s * 0.9)  // esquina trasera derecha
  ctx.closePath()

  ctx.fillStyle = `rgba(180,160,100,${alpha})`
  ctx.fill()

  ctx.restore()
}

// ── RENDER ────────────────────────────────────────────────────────
function redim() {
  cvs.width=window.innerWidth*devicePixelRatio
  cvs.height=window.innerHeight*devicePixelRatio
  cvs.style.width=window.innerWidth+'px'
  cvs.style.height=window.innerHeight+'px'
}

let lastT = performance.now()

function frame(now) {
  const dt = (now - lastT) / 1000 // segundos
  lastT = now
  t += dt

  ctx.clearRect(0,0,cvs.width,cvs.height)

  // fondo
  const g=ctx.createRadialGradient(cvs.width/2,cvs.height/2,0,cvs.width/2,cvs.height/2,cvs.width*.7)
  g.addColorStop(0,'rgba(10,18,45,0.35)'); g.addColorStop(1,'rgba(5,8,16,0)')
  ctx.fillStyle=g; ctx.fillRect(0,0,cvs.width,cvs.height)

  // interpolar barcos
  interpolarBarcos(dt)

  // ── AVISTAMIENTOS ──
  if (capasOn.avistamientos) {
    avistamientos.forEach(a=>{
      const[x,y]=proy(a.lat,a.lon)
      const isH = hoverEl===a
      ctx.beginPath(); ctx.arc(x,y,isH?5*devicePixelRatio:2.5*devicePixelRatio,0,Math.PI*2)
      ctx.fillStyle=isH?'rgba(180,100,220,0.9)':'rgba(180,100,220,0.35)'; ctx.fill()
      if (isH) {
        const p=(Math.sin(t*3)*.5+.5)
        ctx.beginPath(); ctx.arc(x,y,(5+p*5)*devicePixelRatio,0,Math.PI*2)
        ctx.strokeStyle=`rgba(180,100,220,${0.2+p*.2})`; ctx.lineWidth=1*devicePixelRatio; ctx.stroke()
      }
    })
  }

  // ── SISMOS ──
  if (capasOn.sismos) {
    sismos.forEach(s=>{
      const[x,y]=proy(s.lat,s.lon)
      const r=Math.max(2,s.mag*1.8)*devicePixelRatio
      const isH=hoverEl===s
      if (isH) {
        const p=(Math.sin(t*3)*.5+.5)
        ctx.beginPath(); ctx.arc(x,y,r*(2+p),0,Math.PI*2)
        ctx.strokeStyle=`rgba(220,80,80,${0.15+p*.2})`; ctx.lineWidth=1*devicePixelRatio; ctx.stroke()
      }
      ctx.beginPath(); ctx.arc(x,y,isH?r*.8:r*.4,0,Math.PI*2)
      ctx.fillStyle=isH?`rgba(220,80,80,0.9)`:`rgba(220,80,80,${0.3+s.mag/12})`; ctx.fill()
      // anillo exterior estático
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2)
      ctx.strokeStyle=`rgba(220,80,80,0.12)`; ctx.lineWidth=1*devicePixelRatio; ctx.stroke()
    })
  }

  // ── ANIMALES ──
  const tiposA=[
    {tipo:'ballena',col:'rgba(100,160,220,',capa:'ballenas',r:2.8},
    {tipo:'ave',col:'rgba(150,220,150,',capa:'aves',r:1.8},
    {tipo:'tortuga',col:'rgba(220,180,80,',capa:'tortugas',r:2.2},
  ]
  tiposA.forEach(({tipo,col,capa,r})=>{
    if(!capasOn[capa]) return
    animales.filter(a=>a.tipo===tipo).forEach(a=>{
      const isH=hoverEl===a
      // track
      ctx.beginPath()
      const[x0,y0]=proy(a.lats[0],a.lons[0]); ctx.moveTo(x0,y0)
      for(let i=1;i<a.lats.length;i++){const[xi,yi]=proy(a.lats[i],a.lons[i]);ctx.lineTo(xi,yi)}
      ctx.strokeStyle=col+(isH?.18:.08)+')'; ctx.lineWidth=(isH?.8:.4)*devicePixelRatio; ctx.stroke()
      // punto animado
      const prog=((t*.05+a.animOffset)%1)
      const idx=Math.floor(prog*(a.lats.length-1)),frac=(prog*(a.lats.length-1))-idx
      const[ax,ay]=proy(a.lats[idx],a.lons[idx])
      const[bx,by]=proy(a.lats[Math.min(idx+1,a.lats.length-1)],a.lons[Math.min(idx+1,a.lons.length-1)])
      const px=ax+(bx-ax)*frac,py=ay+(by-ay)*frac
      if (isH) {
        const p=(Math.sin(t*3)*.5+.5)
        ctx.beginPath(); ctx.arc(px,py,(r*2.5+p*r)*devicePixelRatio,0,Math.PI*2)
        ctx.strokeStyle=col+(0.15+p*.2)+')'; ctx.lineWidth=1*devicePixelRatio; ctx.stroke()
      }
      ctx.beginPath(); ctx.arc(px,py,(isH?r*1.4:r)*devicePixelRatio,0,Math.PI*2)
      ctx.fillStyle=col+(isH?.95:.7)+')'; ctx.fill()
    })
  })

  // ── BARCOS — triángulos ──
  if (capasOn.barcos) {
    const ahora=Date.now()
    barcos.forEach((b,mmsi)=>{
      if (!b.renderLat||!b.renderLon) return
      const[x,y]=proy(b.renderLat, b.renderLon)
      const edad=(ahora-b.updated)/60000
      const alpha=Math.max(.08,.4-edad*.04)
      const isH=hoverEl&&hoverEl.mmsi===mmsi
      dibujarBarco(x,y,b.heading||0,isH?.95:alpha,isH?3.5:2.5,isH)
    })
  }

  requestAnimationFrame(frame)
}

// ── DETECCIÓN HOVER ───────────────────────────────────────────────
function buscar(px,py) {
  const r=14*devicePixelRatio

  if (capasOn.barcos) {
    let found=null
    barcos.forEach((b,mmsi)=>{
      if (!b.renderLat||!b.renderLon) return
      const[x,y]=proy(b.renderLat,b.renderLon)
      if(Math.hypot(px-x,py-y)<r) found={...b,mmsi}
    })
    if(found) return found
  }

  const tiposA=[
    {tipo:'ballena',capa:'ballenas'},{tipo:'ave',capa:'aves'},{tipo:'tortuga',capa:'tortugas'}
  ]
  for(const{tipo,capa} of tiposA){
    if(!capasOn[capa]) continue
    for(const a of animales.filter(x=>x.tipo===tipo)){
      const prog=((t*.05+a.animOffset)%1)
      const idx=Math.floor(prog*(a.lats.length-1)),frac=(prog*(a.lats.length-1))-idx
      const[ax,ay]=proy(a.lats[idx],a.lons[idx])
      const[bx,by]=proy(a.lats[Math.min(idx+1,a.lats.length-1)],a.lons[Math.min(idx+1,a.lons.length-1)])
      const ppx=ax+(bx-ax)*frac,ppy=ay+(by-ay)*frac
      if(Math.hypot(px-ppx,py-ppy)<r*1.5) return a
    }
  }

  if(capasOn.sismos){
    for(const s of sismos){
      const[sx,sy]=proy(s.lat,s.lon)
      if(Math.hypot(px-sx,py-sy)<Math.max(r,s.mag*2*devicePixelRatio)) return s
    }
  }

  if(capasOn.avistamientos){
    for(const a of avistamientos){
      const[ax,ay]=proy(a.lat,a.lon)
      if(Math.hypot(px-ax,py-ay)<r) return a
    }
  }
  return null
}

function coords(e){
  const r=cvs.getBoundingClientRect(),touch=e.touches?.[0]||e
  return[(touch.clientX-r.left)*devicePixelRatio,(touch.clientY-r.top)*devicePixelRatio]
}

cvs.addEventListener('mousemove',e=>{
  const[px,py]=coords(e)
  hoverEl=buscar(px,py)
  cvs.style.cursor=hoverEl?'pointer':'default'
})

cvs.addEventListener('click',e=>{
  const[px,py]=coords(e)
  const el=buscar(px,py)
  if(el) mostrarInfo(el)
  else cerrarInfo()
})

cvs.addEventListener('touchstart',e=>{
  const[px,py]=coords(e)
  const el=buscar(px,py)
  if(el) mostrarInfo(el)
  else cerrarInfo()
},{passive:true})

// ── INFO PANEL ────────────────────────────────────────────────────
function mostrarInfo(el){
  const panel=document.getElementById('info-panel')
  const tipo=document.getElementById('info-tipo')
  const nombre=document.getElementById('info-nombre')
  const datos=document.getElementById('info-datos')
  panel.classList.add('visible')
  datos.innerHTML=''
  const fila=(k,v)=>{
    if(v===null||v===undefined||v==='') return
    const d=document.createElement('div'); d.className='info-fila'
    d.innerHTML=`<span class="info-key">${k}</span><span class="info-val">${v}</span>`
    datos.appendChild(d)
  }
  if(el.mmsi!==undefined){
    tipo.textContent='embarcación'
    nombre.textContent=el.nombre||`MMSI ${el.mmsi}`
    fila('tipo',tipoBarco(el.shipType||0))
    fila('velocidad',el.speed?`${el.speed.toFixed(1)} nudos`:null)
    fila('rumbo',el.heading&&el.heading<360?`${Math.round(el.heading)}°`:null)
    fila('callsign',el.callSign||null)
    fila('mmsi',el.mmsi)
    fila('última señal',el.updated?new Date(el.updated).toLocaleTimeString('es-CL'):null)
  } else if(el.tipo==='ballena'||el.tipo==='ave'||el.tipo==='tortuga'){
    tipo.textContent=el.tipo
    nombre.textContent=el.especie
    fila('individuo',el.individuoId)
    fila('estudio',el.nombreEstudio)
    fila('última posición',el.lastDate?.slice(0,10)||null)
    fila('puntos',el.lats?.length)
  } else if(el.mag!==undefined){
    tipo.textContent=`sismo M${el.mag}`
    nombre.textContent=el.lugar
    fila('magnitud',el.mag)
    fila('profundidad',el.dep?`${Math.round(el.dep)} km`:null)
    fila('fecha',el.time)
    fila('coordenadas',`${el.lat.toFixed(2)}, ${el.lon.toFixed(2)}`)
  } else {
    tipo.textContent='avistamiento'
    nombre.textContent=el.especie
    fila('fecha',el.fecha?.slice(0,10)||null)
    fila('fuente',el.dataset||null)
    fila('coordenadas',`${el.lat.toFixed(2)}, ${el.lon.toFixed(2)}`)
  }
}

function cerrarInfo(){
  document.getElementById('info-panel').classList.remove('visible')
}

window.addEventListener('resize',redim)

// ── INICIO ────────────────────────────────────────────────────────
redim()
requestAnimationFrame(frame)
conectarAIS()
cargarMovebank()
cargarSismos()
cargarAvistamientos()
</script>
