function proyectar(lat,lon){
  const x=((lon+180)/360)*cvs.width
  const latRad=Math.min(Math.max(lat,-85),85)*Math.PI/180
  const mercN=Math.log(Math.tan(Math.PI/4+latRad/2))
  return[x,(0.5-mercN/(2*Math.PI))*cvs.height]
}

async function cargarCables(){
  try{
    const res=await fetch('/.netlify/functions/cables')
    if(!res.ok)return
    const geo=await res.json();cables=[]
    geo.features?.forEach(f=>{
      const geom=f.geometry;if(!geom)return
      const lines=geom.type==='MultiLineString'?geom.coordinates:geom.type==='LineString'?[geom.coordinates]:[]
      lines.forEach(line=>{const pts=line.map(([lon,lat])=>proyectar(lat,lon));if(pts.length>1)cables.push(pts)})
    })
    document.getElementById('cnt-cables').textContent=cables.length||''
  }catch(e){}
}

async function cargarMovebank(){

    try{
      const res=await fetch(`/.netlify/functions/movebank?study_id=${est.id}`)

      const csv=await res.text();const lineas=csv.trim().split('\n');if(lineas.length<2)continue
      const h=lineas[0].split(',').map(x=>x.replace(/"/g,'').trim())
      const iLat=h.indexOf('location-lat'),iLon=h.indexOf('location-long'),iId=h.indexOf('individual-local-identifier')
      if(iLat<0||iLon<0)continue
      const ind=new Map()
      for(let i=1;i<lineas.length;i++){
        const c=lineas[i].split(','),lat=parseFloat(c[iLat]),lon=parseFloat(c[iLon]),id=c[iId]?.replace(/"/g,'')||'x'
        if(isNaN(lat)||isNaN(lon))continue
        if(!ind.has(id))ind.set(id,[])
        ind.get(id).push({lat,lon})
      }
      ind.forEach((locs)=>{if(locs.length<2)return;animales.push({lats:locs.map(l=>l.lat),lons:locs.map(l=>l.lon),tipo:est.tipo,animOffset:Math.random()})})
      const k=est.tipo==='ballena'?'ballenas':'aves'
      document.getElementById('cnt-'+k).textContent=animales.filter(a=>a.tipo===est.tipo).length||''
    }catch(e){}
  }
}

function conectarAIS(){
  if(aisWs)aisWs.close()
  aisWs=new WebSocket('wss://stream.aisstream.io/v0/stream')
  aisWs.onopen=()=>{ aisWs.send(JSON.stringify({APIKey:AIS_KEY,BoundingBoxes:[[[-85,-180],[85,180]]],FilterMessageTypes:['PositionReport']})) }
  aisWs.onmessage=async(e)=>{
    try{
      const text=typeof e.data==='string'?e.data:await e.data.text()
      const msg=JSON.parse(text);if(msg.MessageType!=='PositionReport')return
      const pos=msg.Message?.PositionReport;if(!pos)return
      const lat=pos.Latitude,lon=pos.Longitude;if(!lat||!lon||lat===0||lon===0)return
      barcos.set(pos.UserId,{lat,lon,heading:pos.TrueHeading||pos.CourseOverGround||0,speed:pos.SpeedOverGround||0,updated:Date.now()})
      const ahora=Date.now();barcos.forEach((v,k)=>{if(ahora-v.updated>600000)barcos.delete(k)})
      document.getElementById('cnt-barcos').textContent=barcos.size||''
    }catch(e){}
  }
  aisWs.onclose=()=>setTimeout(conectarAIS,10000)
}

// ── SETUP ─────────────────────────────────────────────────────────
function setup(){
  redim()
  nc=nodos.map((n,i)=>{
    const a=(i/nodos.length)*Math.PI*2,r=.2+Math.random()*.22
    const x=cvs.width/2+Math.cos(a)*cvs.width*r,y=cvs.height/2+Math.sin(a)*cvs.height*r*.62
    const numC=conxs.filter(c=>c.nodo_origen===n.id||(c.bidireccional&&c.nodo_destino===n.id)).length
    return{...n,x,y,ox:x,oy:y,fase:Math.random()*Math.PI*2,vel:.18+Math.random()*.25,amp:(4+Math.random()*5)*devicePixelRatio,fs:Math.max(10,10+Math.min(numC,10))*devicePixelRatio}
  })
  frame()
}

function redim(){
  const w=mapa.offsetWidth,h=window.innerHeight
  cvs.width=w*devicePixelRatio;cvs.height=h*devicePixelRatio
  cvs.style.width=w+'px';cvs.style.height=h+'px'
}

// ── GALERÍA ───────────────────────────────────────────────────────
function galeriaSet(fragmentos){
  galeriaFragmentos=fragmentos
  galeriaIdx=fragmentos.length>1?Math.floor(Math.random()*fragmentos.length):0
  galeriaRender()
}
function galeriaRender(){
  const f=galeriaFragmentos[galeriaIdx]
  if(!f){document.getElementById('galeria').classList.add('oculta');return}
  document.getElementById('galeria').classList.remove('oculta')
  const img=document.getElementById('panel-img')
  img.classList.remove('ok');img.src=f.url;img.onload=()=>img.classList.add('ok')
  const cont=document.getElementById('galeria-indicadores');cont.innerHTML=''
  if(galeriaFragmentos.length>1){
    galeriaFragmentos.forEach((_,i)=>{
      const dot=document.createElement('div')
      dot.className='galeria-dot'+(i===galeriaIdx?' activo':'')
      dot.onclick=()=>{galeriaIdx=i;galeriaRender()}
      cont.appendChild(dot)
    })
  }
  document.getElementById('galeria-prev').disabled=galeriaIdx<=0
  document.getElementById('galeria-next').disabled=galeriaIdx>=galeriaFragmentos.length-1
  document.getElementById('galeria-nav').style.display=galeriaFragmentos.length>1?'flex':'none'
}
function galeriaNav(dir){
  galeriaIdx=Math.max(0,Math.min(galeriaFragmentos.length-1,galeriaIdx+dir))
  galeriaRender()
}

// ── RENDER ────────────────────────────────────────────────────────
function frame(){
  t+=.005;ctx.clearRect(0,0,cvs.width,cvs.height)
  if(bgImg.complete&&bgImg.naturalWidth>0){ctx.save();ctx.globalAlpha=.06;ctx.drawImage(bgImg,0,0,cvs.width,cvs.height);ctx.restore()}
  const g=ctx.createRadialGradient(cvs.width/2,cvs.height/2,0,cvs.width/2,cvs.height/2,cvs.width*.7)
  g.addColorStop(0,'rgba(5,8,16,0)');g.addColorStop(1,'rgba(5,8,16,.7)')
  ctx.fillStyle=g;ctx.fillRect(0,0,cvs.width,cvs.height)
  nc.forEach(n=>{if(n===drag)return;n.x=n.ox+Math.sin(t*n.vel+n.fase)*n.amp;n.y=n.oy+Math.cos(t*n.vel*.7+n.fase*1.4)*n.amp*.55})

  if(vivo){
    // cables
    if(cables.length>0){
      const al=capasOn.cables?.07:.015
      ctx.save();ctx.strokeStyle=`rgba(180,220,255,${al})`;ctx.lineWidth=.6*devicePixelRatio
      cables.forEach(pts=>{ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.stroke()})
      ctx.restore()
    }
    // conquista
    RUTAS_CONQUISTA.forEach((ruta,ri)=>{
      const alL=capasOn.conquista?.32:.04,alD=capasOn.conquista?.88:.1
      ctx.save();ctx.setLineDash([4*devicePixelRatio,6*devicePixelRatio]);ctx.lineWidth=.8*devicePixelRatio
      ctx.beginPath();ruta.puntos.forEach(([lon,lat],i)=>{const[x,y]=proyectar(lat,lon);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)})
      ctx.strokeStyle=ruta.color+alL+')';ctx.stroke();ctx.setLineDash([])
      const prog=((t*.05+(ri*.2))%1),total=ruta.puntos.length-1,idx=Math.floor(prog*total),frac=(prog*total)-idx
      const[lon1,lat1]=ruta.puntos[Math.min(idx,total)],[lon2,lat2]=ruta.puntos[Math.min(idx+1,total)]
      const[x1,y1]=proyectar(lat1,lon1),[x2,y2]=proyectar(lat2,lon2)
      const px=x1+(x2-x1)*frac,py=y1+(y2-y1)*frac
      ctx.beginPath();ctx.arc(px,py,5*devicePixelRatio,0,Math.PI*2);ctx.fillStyle=ruta.color+'.08)';ctx.fill()
      ctx.beginPath();ctx.arc(px,py,2.5*devicePixelRatio,0,Math.PI*2);ctx.fillStyle=ruta.color+alD+')';ctx.fill()
      ctx.restore()
    })
    // animales
    animales.forEach(a=>{
      if(a.lats.length<2)return
      const esB=a.tipo==='ballena',col=esB?'rgba(100,160,220,':'rgba(150,220,150,',capa=esB?'ballenas':'aves'
      const alL=capasOn[capa]?.12:.02,alD=capasOn[capa]?.75:.1
      ctx.beginPath();const[x0,y0]=proyectar(a.lats[0],a.lons[0]);ctx.moveTo(x0,y0)
      for(let i=1;i<a.lats.length;i++){const[xi,yi]=proyectar(a.lats[i],a.lons[i]);ctx.lineTo(xi,yi)}
      ctx.strokeStyle=col+alL+')';ctx.lineWidth=.5*devicePixelRatio;ctx.stroke()
      const prog=((t*.08+a.animOffset)%1),idx=Math.floor(prog*(a.lats.length-1)),frac=(prog*(a.lats.length-1))-idx
      const[ax,ay]=proyectar(a.lats[idx],a.lons[idx]),[bx,by]=proyectar(a.lats[Math.min(idx+1,a.lats.length-1)],a.lons[Math.min(idx+1,a.lons.length-1)])
      const px=ax+(bx-ax)*frac,py=ay+(by-ay)*frac
      ctx.beginPath();ctx.arc(px,py,(esB?3:1.8)*devicePixelRatio,0,Math.PI*2);ctx.fillStyle=col+alD+')';ctx.fill()
    })
    // barcos
    const ahora=Date.now()
    barcos.forEach(b=>{
      const[bx,by]=proyectar(b.lat,b.lon),edad=(ahora-b.updated)/60000
      const alBase=capasOn.barcos?Math.max(.06,.32-edad*.04):.03
      ctx.beginPath();ctx.arc(bx,by,1.8*devicePixelRatio,0,Math.PI*2);ctx.fillStyle=`rgba(180,160,100,${alBase})`;ctx.fill()
      if(b.heading&&b.heading<360){const rad=(b.heading-90)*Math.PI/180,len=6*devicePixelRatio;ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+Math.cos(rad)*len,by+Math.sin(rad)*len);ctx.strokeStyle=`rgba(180,160,100,${alBase*.5})`;ctx.lineWidth=.4*devicePixelRatio;ctx.stroke()}
    })
    // narrativas
    narrativas.forEach(nav=>{
      const nns=nodosDeNarrativa(nav.id);if(nns.length<2)return
      const esA=narrativaActiva&&narrativaActiva.id===nav.id
      for(let i=0;i<nns.length-1;i++){
        const a=nns[i],b=nns[i+1];if(!a||!b)continue
        const mx=(a.x+b.x)/2+(b.y-a.y)*.15,my=(a.y+b.y)/2-(b.x-a.x)*.15
        ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.quadraticCurveTo(mx,my,b.x,b.y)
        ctx.strokeStyle=rgba(nav.color,esA?.22:.06);ctx.lineWidth=(esA?1:.5)*devicePixelRatio;ctx.setLineDash([]);ctx.stroke()
        if(esA){const prog=((t*.35+i*.25)%1),t2=1-prog,px=t2*t2*a.x+2*t2*prog*mx+prog*prog*b.x,py=t2*t2*a.y+2*t2*prog*my+prog*prog*b.y;ctx.beginPath();ctx.arc(px,py,2.5*devicePixelRatio,0,Math.PI*2);ctx.fillStyle=rgba(nav.color,.7);ctx.fill()}
      }
    })
  }

  // vectores
  const ref=hover||seleccionado||activo
  if(ref){
    getConns(ref.id).forEach(({nodo:o,peso})=>{
      if(!o)return
      const lg=ctx.createLinearGradient(ref.x,ref.y,o.x,o.y)
      lg.addColorStop(0,rgba(COLS[ref.eje],.6));lg.addColorStop(1,rgba(COLS[o.eje],.2))
      const mx=(ref.x+o.x)/2+(o.y-ref.y)*.13,my=(ref.y+o.y)/2-(o.x-ref.x)*.13
      ctx.beginPath();ctx.moveTo(ref.x,ref.y);ctx.quadraticCurveTo(mx,my,o.x,o.y)
      ctx.strokeStyle=lg;ctx.lineWidth=Math.max(.4,(peso/10)*1.5)*devicePixelRatio
      ctx.setLineDash([3*devicePixelRatio,5*devicePixelRatio]);ctx.stroke();ctx.setLineDash([])
      ctx.beginPath();ctx.arc(o.x,o.y,2.5*devicePixelRatio,0,Math.PI*2);ctx.fillStyle=rgba(COLS[o.eje],.5);ctx.fill()
    })
  }

  // palabras
  const todosEjesOn=Object.values(ejesOn).every(v=>v)
  nc.forEach(n=>{
    const esH=n===hover,esSel=n===seleccionado,esA=n===activo
    const esConn=ref&&getConns(ref.id).some(c=>c.nodo===n)
    const enNarrActiva=narrativaActiva&&narrativaNodos.some(nn=>nn.narrativa_id===narrativaActiva.id&&nn.nodo_id===n.id)
    let esNavVecino=false
    if(narrativaActiva&&activo){const pA=posEnNarrativa(narrativaActiva.id,activo.id),pN=posEnNarrativa(narrativaActiva.id,n.id);esNavVecino=Math.abs(pN-pA)===1}
    const ejeActivo=ejesOn[n.eje],ejeApagado=!todosEjesOn&&!ejeActivo
    const dim=ref&&!esH&&!esSel&&!esA&&!esConn&&!enNarrActiva
    const fs=(esH||esSel||esA)?n.fs*1.07:n.fs
    ctx.font=`${(esH||esSel||esA)?400:300} ${fs}px ${FONT_WORDS}`
    const w=ctx.measureText(n.nombre).width
    if(esH||esSel||esA||esNavVecino){
      ctx.beginPath();ctx.ellipse(n.x,n.y,w/2+16*devicePixelRatio,fs/2+9*devicePixelRatio,0,0,Math.PI*2)
      ctx.fillStyle=rgba(esNavVecino&&narrativaActiva?narrativaActiva.color:COLS[n.eje],(esA||esSel)?.09:.04);ctx.fill()
    }
    let al
    if(esH)al=1
    else if(esA)al=.95
    else if(esSel)al=.9
    else if(esNavVecino)al=.82
    else if(esConn)al=.72
    else if(enNarrActiva)al=.45
    else if(dim)al=.06
    else if(ejeApagado)al=.1
    else if(!todosEjesOn&&ejeActivo)al=vivo?.88:0
    else al=vivo?.52:0
    const col=(esNavVecino&&narrativaActiva)?narrativaActiva.color:COLS[n.eje]
    ctx.fillStyle=rgba(col,al);ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(n.nombre,n.x,n.y)
    if(esH||esSel||esA||esConn||esNavVecino){
      ctx.beginPath();ctx.moveTo(n.x-w/2,n.y+fs/2+2*devicePixelRatio);ctx.lineTo(n.x+w/2,n.y+fs/2+2*devicePixelRatio)
      ctx.strokeStyle=rgba(col,(esH||esSel||esA)?.65:.25);ctx.lineWidth=((esH||esSel||esA)?1:.4)*devicePixelRatio;ctx.stroke()
    }
  })
  requestAnimationFrame(frame)
}

// ── HELPERS ───────────────────────────────────────────────────────
function nodosDeNarrativa(navId){return narrativaNodos.filter(nn=>nn.narrativa_id===navId).sort((a,b)=>a.orden-b.orden).map(nn=>nc.find(n=>n.id===nn.nodo_id)).filter(Boolean)}
function narrativasDeNodo(nodoId){const navIds=[...new Set(narrativaNodos.filter(nn=>nn.nodo_id===nodoId).map(nn=>nn.narrativa_id))];return narrativas.filter(nav=>navIds.includes(nav.id))}
function posEnNarrativa(navId,nodoId){const nn=narrativaNodos.find(n=>n.narrativa_id===navId&&n.nodo_id===nodoId);return nn?nn.orden:-1}
function getConns(id){
  return conxs.filter(c=>c.nodo_origen===id||(c.bidireccional&&c.nodo_destino===id))
    .map(c=>{const did=c.nodo_origen===id?c.nodo_destino:c.nodo_origen;const bon=historial.filter(h=>h===did).length*1.5;return{nodo:nc.find(n=>n.id===did),peso:Math.min(10,c.peso+bon),tipo:c.tipo_relacion}})
    .filter(c=>c.nodo).sort((a,b)=>b.peso-a.peso)
}
function rgba(hex,a){return`rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},${a})`}

// ── INTERACCIÓN ───────────────────────────────────────────────────
function seleccionar(nodo){
  if(seleccionado===nodo){abrirPanel(nodo);return}
  seleccionado=nodo;narrativaActiva=narrativasDeNodo(nodo.id)[0]||null
  hint.textContent=`∿ click de nuevo para explorar ${nodo.nombre}`
  hint.style.opacity='1';setTimeout(()=>{hint.style.opacity='0'},2500)
}

async function abrirPanel(nodo){
  activo=nodo;seleccionado=nodo;historial.push(nodo.id);hint.style.opacity='0'
  narrativaActiva=narrativasDeNodo(nodo.id)[0]||null
  mapa.classList.add('partido');panel.classList.add('visible');setTimeout(redim,680)
  document.getElementById('panel-nombre').textContent=nodo.nombre
  const ejEl=document.getElementById('panel-eje');ejEl.textContent=nodo.eje;ejEl.style.color=COLS[nodo.eje]
  const navBadge=document.getElementById('panel-narrativa')
  if(narrativaActiva){document.getElementById('panel-narrativa-nombre').textContent=narrativaActiva.nombre;document.getElementById('panel-narrativa-dot').style.background=narrativaActiva.color;navBadge.classList.add('visible')}
  else{navBadge.classList.remove('visible')}
  const navNav=document.getElementById('panel-nav-narrativa')
  if(narrativaActiva){
    const nns=nodosDeNarrativa(narrativaActiva.id),idx=nns.findIndex(n=>n.id===nodo.id)
    navNav.classList.add('visible');document.getElementById('btn-prev').disabled=idx<=0;document.getElementById('btn-next').disabled=idx>=nns.length-1
  }else{navNav.classList.remove('visible')}
  document.getElementById('panel-txt').textContent=nodo.texto_principal||''
  const{data:frags}=await db.from('fragmentos').select('*').eq('nodo_id',nodo.id).eq('tipo','imagen').is('contexto_previo',null).order('orden')
  if(frags&&frags.length>0){
    galeriaSet(frags)
  }else if(historial.length>1){
    const prev=historial[historial.length-2]
    const{data:cf}=await db.from('fragmentos').select('*').eq('nodo_id',nodo.id).eq('contexto_previo',prev).limit(1)
    if(cf?.length)galeriaSet(cf)
    else document.getElementById('galeria').classList.add('oculta')
  }else{document.getElementById('galeria').classList.add('oculta')}
  const lista=document.getElementById('panel-asocs');lista.innerHTML=''
  getConns(nodo.id).slice(0,7).forEach(({nodo:o,peso,tipo})=>{
    if(!o)return
    const enNav=narrativaActiva&&narrativaNodos.some(nn=>nn.narrativa_id===narrativaActiva.id&&nn.nodo_id===o.id)
    const col=enNav&&narrativaActiva?narrativaActiva.color:COLS[o.eje]
    const el=document.createElement('div')
    el.style.cssText=`display:flex;align-items:center;gap:.6rem;margin-bottom:.85rem;cursor:pointer;opacity:.35;transition:opacity .3s;`
    el.onmouseenter=()=>el.style.opacity=1;el.onmouseleave=()=>el.style.opacity=.35
    el.innerHTML=`<div style="width:${peso*3}px;height:1px;background:${col};opacity:.5;flex-shrink:0"></div><span style="font-size:.75rem;letter-spacing:.06em;color:${col};font-family:'Barlow Condensed',sans-serif;font-weight:300">${o.nombre}</span><span style="font-size:.48rem;letter-spacing:.2em;color:rgba(255,255,255,.15);text-transform:lowercase">${tipo||''}</span>${enNav?`<span style="font-size:.42rem;color:${col};opacity:.6">∿</span>`:''}`
    el.onclick=()=>{seleccionado=o;abrirPanel(o)}
    lista.appendChild(el)
  })
}

function navNarrativa(dir){
  if(!narrativaActiva||!activo)return
  const nns=nodosDeNarrativa(narrativaActiva.id),idx=nns.findIndex(n=>n.id===activo.id)
  const sig=nns[idx+dir];if(sig){seleccionado=sig;abrirPanel(sig)}
}

function cerrar(){
  panel.classList.remove('visible','fullscreen');mapa.classList.remove('partido')
  activo=null;seleccionado=null;narrativaActiva=null
  document.getElementById('btn-fs').textContent='⤢ expandir';setTimeout(redim,680)
}

function toggleFS(){
  const esFull=panel.classList.toggle('fullscreen')
  if(esFull){mapa.classList.remove('partido');document.getElementById('btn-fs').textContent='⤡ contraer'}
  else{mapa.classList.add('partido');document.getElementById('btn-fs').textContent='⤢ expandir'}
  setTimeout(redim,680)
}

function hundirse(){
  // iniciar audio AQUÍ — dentro del click, antes de cualquier async
  hidrofono.play().catch(() => {})
  document.getElementById('audio-ui').classList.add('visible')

  const v=document.getElementById('velo'); v.classList.add('on')
  setTimeout(()=>{
    document.getElementById('superficie').classList.add('oculto')
    vivo=true
    document.getElementById('capas-ui').classList.add('visible')
    document.getElementById('ejes-ui').classList.add('visible')
    v.classList.remove('on')
    conectarAIS()
    cargarMovebank()
    cargarCables()
  },700)
}

// ── EVENTOS ───────────────────────────────────────────────────────
function find(px,py){
  return nc.slice().reverse().find(n=>{
    ctx.font=`300 ${n.fs}px ${FONT_WORDS}`;const w=ctx.measureText(n.nombre).width,m=14*devicePixelRatio
    return px>=n.x-w/2-m&&px<=n.x+w/2+m&&py>=n.y-n.fs/2-m&&py<=n.y+n.fs/2+m
  })
}
function pos(e){const r=cvs.getBoundingClientRect(),touch=e.touches?.[0]||e;return[(touch.clientX-r.left)*devicePixelRatio,(touch.clientY-r.top)*devicePixelRatio]}

cvs.addEventListener('mousemove',e=>{
  if(!vivo)return;const[px,py]=pos(e);hover=find(px,py)||null;cvs.style.cursor=hover?'pointer':'default'
  if(drag){drag.ox=(px-ddx)/devicePixelRatio;drag.oy=(py-ddy)/devicePixelRatio}
})
cvs.addEventListener('mouseleave',()=>{hover=null})
cvs.addEventListener('mousedown',e=>{const[px,py]=pos(e);clickX=px;clickY=py;const n=find(px,py);if(n){drag=n;ddx=px-n.ox*devicePixelRatio;ddy=py-n.oy*devicePixelRatio}})
cvs.addEventListener('mouseup',e=>{
  const[px,py]=pos(e),moved=Math.hypot(px-clickX,py-clickY)>5*devicePixelRatio,n=find(px,py)
  if(n&&!moved){seleccionar(n)}else if(!n&&!moved){seleccionado=null;activo=null;narrativaActiva=null;if(panel.classList.contains('visible'))cerrar()}
  drag=null
})
cvs.addEventListener('touchstart',e=>{
  if(!vivo)return;const[px,py]=pos(e),n=find(px,py)
  if(n){seleccionar(n)}else{seleccionado=null;activo=null;narrativaActiva=null;if(panel.classList.contains('visible'))cerrar()}
},{passive:true})
window.addEventListener('resize',redim)
init()
</script>
