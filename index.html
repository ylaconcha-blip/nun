<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --desastre:   #378ADD;
  --mitologia:  #7F77DD;
  --geopolitica:#D85A30;
  --biologia:   #1D9E75;
  --antropoceno:#BA7517;
  --bg: #050810;
}
body {
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  width: 100vw; height: 100vh;
}
#mapa {
  position: fixed; top:0; left:0;
  width: 100%; height: 100%;
  transition: width 0.65s cubic-bezier(0.4,0,0.2,1),
              transform 0.65s cubic-bezier(0.4,0,0.2,1);
  z-index: 1;
}
#mapa.partido { width: 67%; transform: scale(0.96); transform-origin: center center; }
canvas { position: absolute; inset:0; width:100%; height:100%; }

#superficie {
  position: fixed; inset:0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 100; transition: opacity 1.5s ease;
}
#superficie.oculto { opacity:0; pointer-events:none; }
#titulo {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(5rem,14vw,11rem); font-weight:200;
  letter-spacing:0.4em; color:white; opacity:0;
  animation: subir 2s ease 0.4s forwards;
}
#sub {
  font-size: clamp(0.6rem,1.3vw,0.8rem); letter-spacing:0.5em;
  color:rgba(255,255,255,0.3); margin-top:0.6rem; margin-bottom:5rem;
  opacity:0; animation: subir 2s ease 1s forwards;
  text-transform:lowercase; font-weight:300;
}
#btn-hundirse {
  background:none; border:none; color:rgba(255,255,255,0.18);
  font-family:'Inter',sans-serif; font-size:0.65rem; letter-spacing:0.6em;
  cursor:pointer; text-transform:lowercase; opacity:0;
  animation: subir 2s ease 2.2s forwards; transition:color 0.6s; font-weight:300;
}
#btn-hundirse:hover { color:rgba(255,255,255,0.6); }
#nav {
  position:fixed; top:1.8rem; right:2rem;
  display:flex; gap:2.5rem; z-index:110;
  opacity:0; animation: subir 1s ease 3s forwards;
}
#nav a {
  color:rgba(255,255,255,0.18); text-decoration:none;
  font-size:0.6rem; letter-spacing:0.35em; text-transform:lowercase;
  transition:color 0.4s; font-weight:300;
}
#nav a:hover { color:rgba(255,255,255,0.55); }

/* indicadores top left */
#indicadores {
  position:fixed; top:1.8rem; left:2rem;
  display:flex; flex-direction:column; gap:0.5rem;
  z-index:110; opacity:0; transition:opacity 1s ease;
}
#indicadores.visible { opacity:1; }
.ind-row {
  display:flex; align-items:center; gap:0.5rem;
  opacity:0.3;
}
.ind-dot {
  width:5px; height:5px; border-radius:50%;
  background:rgba(255,255,255,0.3); transition:background 0.5s; flex-shrink:0;
}
.ind-dot.on { animation: pulso 1.5s ease infinite; }
.ind-label { font-size:0.45rem; letter-spacing:0.3em; text-transform:lowercase; color:rgba(255,255,255,0.7); font-weight:300; }
.ind-count { font-size:0.4rem; letter-spacing:0.2em; color:rgba(255,255,255,0.35); }

@keyframes pulso { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(1.5)} }

/* PANEL */
#panel {
  position:fixed; top:0; right:0; width:33%; height:100%;
  background:rgba(5,8,16,0.97);
  border-left:1px solid rgba(255,255,255,0.05);
  display:flex; flex-direction:column;
  transform:translateX(100%);
  transition:transform 0.65s cubic-bezier(0.4,0,0.2,1);
  z-index:40; overflow:hidden;
}
#panel.visible { transform:translateX(0); }
#panel.fullscreen { width:100%; border-left:none; }
#panel-header {
  padding:2rem 2rem 1.2rem;
  border-bottom:1px solid rgba(255,255,255,0.04);
  display:flex; align-items:flex-start; justify-content:space-between; flex-shrink:0;
}
#panel-nombre {
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(1.6rem,2.8vw,2.4rem); font-weight:300;
  letter-spacing:0.15em; color:white; line-height:1; text-transform:lowercase;
}
#panel-eje { font-size:0.52rem; letter-spacing:0.4em; text-transform:lowercase; margin-top:0.5rem; opacity:0.6; font-weight:300; }
#panel-narrativa { font-size:0.48rem; letter-spacing:0.35em; text-transform:lowercase; margin-top:0.4rem; opacity:0; transition:opacity 0.5s; display:flex; align-items:center; gap:0.4rem; font-weight:300; }
#panel-narrativa.visible { opacity:0.7; }
#panel-narrativa-dot { width:4px; height:4px; border-radius:50%; flex-shrink:0; }
#header-btns { display:flex; flex-direction:column; align-items:flex-end; gap:0.6rem; flex-shrink:0; }
#btn-cerrar { background:none; border:none; color:rgba(255,255,255,0.3); cursor:pointer; font-size:1.2rem; line-height:1; transition:color 0.3s; }
#btn-cerrar:hover { color:white; }
#btn-fs { background:none; border:none; color:rgba(255,255,255,0.12); cursor:pointer; font-size:0.52rem; letter-spacing:0.3em; text-transform:lowercase; font-family:'Inter',sans-serif; transition:color 0.4s; font-weight:300; }
#btn-fs:hover { color:rgba(255,255,255,0.4); }
#panel-body { flex:1; overflow-y:auto; scrollbar-width:none; }
#panel-body::-webkit-scrollbar { display:none; }
#panel-img { width:100%; max-height:45vh; object-fit:cover; display:block; opacity:0; transition:opacity 1s ease; }
#panel-img.ok { opacity:1; }
#panel-img.hide { display:none; }
#panel-txt { padding:1.5rem 2rem; font-size:0.82rem; line-height:1.95; color:rgba(255,255,255,0.45); font-weight:300; }
#panel-nav-narrativa { margin:0 2rem 1.5rem; display:none; align-items:center; gap:1rem; }
#panel-nav-narrativa.visible { display:flex; }
.nav-btn { background:none; border:1px solid rgba(255,255,255,0.07); color:rgba(255,255,255,0.3); font-family:'Inter',sans-serif; font-size:0.55rem; letter-spacing:0.3em; text-transform:lowercase; cursor:pointer; padding:0.4rem 0.8rem; transition:all 0.3s; flex:1; text-align:center; font-weight:300; }
.nav-btn:hover { border-color:rgba(255,255,255,0.2); color:rgba(255,255,255,0.7); }
.nav-btn:disabled { opacity:0.15; cursor:default; }
#panel-footer { padding:1.2rem 2rem 1.8rem; border-top:1px solid rgba(255,255,255,0.04); flex-shrink:0; }
#footer-label { font-size:0.48rem; letter-spacing:0.45em; text-transform:lowercase; color:rgba(255,255,255,0.1); margin-bottom:1rem; font-weight:300; }

/* LEYENDA */
#leyenda { position:fixed; bottom:1.8rem; left:1.8rem; display:flex; flex-direction:column; gap:0.5rem; z-index:30; opacity:0; pointer-events:none; transition:opacity 1s ease; }
#leyenda.visible { opacity:0.25; }
#leyenda-narrativas { margin-top:0.8rem; padding-top:0.8rem; border-top:1px solid rgba(255,255,255,0.07); display:flex; flex-direction:column; gap:0.5rem; }
#leyenda-capas { margin-top:0.8rem; padding-top:0.8rem; border-top:1px solid rgba(255,255,255,0.07); display:flex; flex-direction:column; gap:0.5rem; }
.li { display:flex; align-items:center; gap:0.5rem; font-size:0.5rem; letter-spacing:0.2em; text-transform:lowercase; color:rgba(255,255,255,0.9); font-weight:300; }
.ld { width:4px; height:4px; border-radius:50%; flex-shrink:0; }
.ln { width:16px; height:1px; flex-shrink:0; }

#hint { position:fixed; bottom:1.8rem; left:50%; transform:translateX(-50%); font-size:0.52rem; letter-spacing:0.35em; color:rgba(255,255,255,0.1); text-transform:lowercase; z-index:30; pointer-events:none; transition:opacity 0.5s; white-space:nowrap; font-weight:300; }
#velo { position:fixed; inset:0; background:var(--bg); z-index:200; opacity:0; pointer-events:none; transition:opacity 0.7s ease; }
#velo.on { opacity:1; }
@keyframes subir { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>

<script>
// ── CREDENCIALES ─────────────────────────────────────────────────
const SURL = 'https://uwduhddojpodzyvipbrq.supabase.co'
const SKEY = 'sb_publishable_V38s6emQE9jMQ54WhSIlJw_7WzJhGFY'
const AIS_KEY = 'f233b8fe03520713d0d9f0b013e79324a5195365'
const MB_USER = 'Rahsaaan'
const MB_PASS = 'Rahsaaan123$%&'
const MB_AUTH = 'Basic ' + btoa(MB_USER + ':' + MB_PASS)

// estudios Movebank
const MB_ESTUDIOS = [
  { id: '5161274049', tipo: 'ballena', nombre: 'jorobada Pacífico' },
  { id: '446603',     tipo: 'ave',     nombre: 'pardela Chile' },
  { id: '5549752586', tipo: 'ave',     nombre: 'piquero peruano' },
  { id: '5371230531', tipo: 'ave',     nombre: 'pingüino Humboldt' },
]

const { createClient } = supabase
const db = createClient(SURL, SKEY)

const COLS = {
  desastre:'#378ADD', mitologia:'#7F77DD',
  geopolitica:'#D85A30', biologia:'#1D9E75', antropoceno:'#BA7517'
}
const COL_BARCO  = 'rgba(180,160,100,'
const COL_BALLENA= 'rgba(100,160,220,'
const COL_AVE    = 'rgba(150,220,150,'

const FONT_WORDS = "'Barlow Condensed', sans-serif"

const bgImg = new Image()
bgImg.crossOrigin = 'anonymous'
bgImg.src = 'https://uwduhddojpodzyvipbrq.supabase.co/storage/v1/object/public/nun-media/seabed%20sonar%20mapping.jpg'

let nodos=[], conxs=[], narrativas=[], narrativaNodos=[], nc=[]
let hover=null, seleccionado=null, activo=null
let historial=[], vivo=false
let t=0, drag=null, ddx=0, ddy=0, clickX=0, clickY=0
let narrativaActiva=null

// capas de movimiento
const barcos = new Map()   // mmsi → {lat,lon,heading,updated}
const animales = []         // {lats[], lons[], tipo, nombre, animOffset}

let aisWs = null

const cvs = document.getElementById('c')
const ctx = cvs.getContext('2d')
const mapa = document.getElementById('mapa')
const panel = document.getElementById('panel')
const hint = document.getElementById('hint')

// ── CARGA SUPABASE ────────────────────────────────────────────────
async function init() {
  const [{ data:n },{ data:c },{ data:nav },{ data:nn }] = await Promise.all([
    db.from('nodos').select('*').eq('activo',true),
    db.from('conexiones').select('*'),
    db.from('narrativas').select('*'),
    db.from('narrativa_nodos').select('*').order('orden')
  ])
  nodos=n||[]; conxs=c||[]
  narrativas=nav||[]; narrativaNodos=nn||[]
  renderLeyendaNarrativas()
  setup()
}

function renderLeyendaNarrativas() {
  const cont = document.getElementById('leyenda-narrativas')
  narrativas.forEach(nav => {
    const el = document.createElement('div')
    el.className = 'li'
    el.innerHTML = `<div class="ln" style="background:${nav.color};opacity:0.6"></div><span>${nav.nombre}</span>`
    cont.appendChild(el)
  })
}

// ── MOVEBANK ──────────────────────────────────────────────────────
async function cargarMovebank() {
  for (const estudio of MB_ESTUDIOS) {
    try {
      const url = `https://www.movebank.org/movebank/service/direct-read?entity_type=event&study_id=${estudio.id}&max_events_per_individual=200&attributes=timestamp,location_lat,location_long,individual_local_identifier`
      const res = await fetch(url, {
        headers: { 'Authorization': MB_AUTH }
      })
      if (!res.ok) continue
      const csv = await res.text()
      const lineas = csv.trim().split('\n')
      if (lineas.length < 2) continue
      const headers = lineas[0].split(',').map(h => h.replace(/"/g,'').trim())
      const iLat  = headers.indexOf('location-lat')
      const iLon  = headers.indexOf('location-long')
      const iId   = headers.indexOf('individual-local-identifier')
      if (iLat < 0 || iLon < 0) continue

      // agrupar por individuo
      const individuos = new Map()
      for (let i=1; i<lineas.length; i++) {
        const cols = lineas[i].split(',')
        const lat = parseFloat(cols[iLat])
        const lon = parseFloat(cols[iLon])
        const id  = cols[iId]?.replace(/"/g,'') || 'unknown'
        if (isNaN(lat)||isNaN(lon)) continue
        if (!individuos.has(id)) individuos.set(id,[])
        individuos.get(id).push({lat,lon})
      }

      individuos.forEach((locs, id) => {
        if (locs.length < 2) return
        animales.push({
          lats: locs.map(l=>l.lat),
          lons: locs.map(l=>l.lon),
          tipo: estudio.tipo,
          nombre: id,
          animOffset: Math.random()
        })
      })

      const cnt = document.getElementById('cnt-' + (estudio.tipo === 'ballena' ? 'ballenas' : 'aves'))
      if (cnt) cnt.textContent = animales.filter(a=>a.tipo===estudio.tipo).length || ''

    } catch(e) { /* silencioso */ }
  }
}

// ── AIS ───────────────────────────────────────────────────────────
function conectarAIS() {
  if (aisWs) aisWs.close()
  aisWs = new WebSocket('wss://stream.aisstream.io/v0/stream')

  aisWs.onopen = () => {
    document.getElementById('dot-ais').classList.add('on')
    document.getElementById('dot-ais').style.background = 'rgba(180,160,100,0.8)'
    aisWs.send(JSON.stringify({
      APIKey: AIS_KEY,
      BoundingBoxes: [[[-85,-180],[85,180]]],
      FilterMessageTypes: ['PositionReport']
    }))
  }

  aisWs.onmessage = async (e) => {
    try {
      const text = typeof e.data === 'string' ? e.data : await e.data.text()
      const msg = JSON.parse(text)
      if (msg.MessageType !== 'PositionReport') return
      const pos = msg.Message?.PositionReport
      if (!pos) return
      const lat = pos.Latitude, lon = pos.Longitude
      if (!lat||!lon||lat===0||lon===0) return
      barcos.set(pos.UserId, {
        lat, lon,
        heading: pos.TrueHeading||pos.CourseOverGround||0,
        updated: Date.now()
      })
      const ahora = Date.now()
      barcos.forEach((v,k)=>{ if(ahora-v.updated>600000) barcos.delete(k) })
      document.getElementById('cnt-ais').textContent = barcos.size||''
    } catch(e) {}
  }

  aisWs.onclose = () => {
    document.getElementById('dot-ais').classList.remove('on')
    document.getElementById('dot-ais').style.background = 'rgba(180,160,100,0.3)'
    setTimeout(conectarAIS, 10000)
  }
}

// proyección mercator
function proyectar(lat, lon) {
  const x = ((lon + 180) / 360) * cvs.width
  const latRad = Math.min(Math.max(lat,-85),85) * Math.PI / 180
  const mercN = Math.log(Math.tan(Math.PI/4 + latRad/2))
  const y = (0.5 - mercN/(2*Math.PI)) * cvs.height
  return [x, y]
}

// ── SETUP ─────────────────────────────────────────────────────────
function setup() {
  redim()
  nc = nodos.map((n,i)=>{
    const a=(i/nodos.length)*Math.PI*2
    const r=0.2+Math.random()*0.22
    const x=cvs.width/2+Math.cos(a)*cvs.width*r
    const y=cvs.height/2+Math.sin(a)*cvs.height*r*0.62
    const numConns=conxs.filter(c=>c.nodo_origen===n.id||(c.bidireccional&&c.nodo_destino===n.id)).length
    const fsBase=Math.max(10,10+Math.min(numConns*1.0,10))
    return {...n,x,y,ox:x,oy:y,
      fase:Math.random()*Math.PI*2, vel:0.18+Math.random()*0.25,
      amp:(4+Math.random()*5)*devicePixelRatio, fs:fsBase*devicePixelRatio}
  })
  frame()
}

function redim() {
  const w=mapa.offsetWidth, h=window.innerHeight
  cvs.width=w*devicePixelRatio; cvs.height=h*devicePixelRatio
  cvs.style.width=w+'px'; cvs.style.height=h+'px'
}

// ── RENDER ────────────────────────────────────────────────────────
function frame() {
  t += 0.005
  ctx.clearRect(0,0,cvs.width,cvs.height)

  // fondo sonar
  if (bgImg.complete && bgImg.naturalWidth>0) {
    ctx.save(); ctx.globalAlpha=0.06
    ctx.drawImage(bgImg,0,0,cvs.width,cvs.height)
    ctx.restore()
  }

  // viñeta
  const g=ctx.createRadialGradient(cvs.width/2,cvs.height/2,0,cvs.width/2,cvs.height/2,cvs.width*.7)
  g.addColorStop(0,'rgba(5,8,16,0)'); g.addColorStop(1,'rgba(5,8,16,0.75)')
  ctx.fillStyle=g; ctx.fillRect(0,0,cvs.width,cvs.height)

  // flotar
  nc.forEach(n=>{
    if(n===drag) return
    n.x=n.ox+Math.sin(t*n.vel+n.fase)*n.amp
    n.y=n.oy+Math.cos(t*n.vel*.7+n.fase*1.4)*n.amp*.55
  })

  // ── TRACKS ANIMALES ──
  if (vivo && animales.length > 0) {
    animales.forEach(a => {
      if (a.lats.length < 2) return
      const col = a.tipo === 'ballena' ? COL_BALLENA : COL_AVE
      const alpha = 0.12

      // dibujar track completo muy sutil
      ctx.beginPath()
      const [x0,y0] = proyectar(a.lats[0], a.lons[0])
      ctx.moveTo(x0,y0)
      for (let i=1; i<a.lats.length; i++) {
        const [xi,yi] = proyectar(a.lats[i], a.lons[i])
        ctx.lineTo(xi,yi)
      }
      ctx.strokeStyle = col + alpha + ')'
      ctx.lineWidth = 0.5 * devicePixelRatio
      ctx.setLineDash([])
      ctx.stroke()

      // punto animado moviéndose a lo largo del track
      const prog = ((t * 0.08 + a.animOffset) % 1)
      const idx = Math.floor(prog * (a.lats.length-1))
      const frac = (prog * (a.lats.length-1)) - idx
      const [ax,ay] = proyectar(a.lats[idx], a.lons[idx])
      const [bx,by] = proyectar(
        a.lats[Math.min(idx+1,a.lats.length-1)],
        a.lons[Math.min(idx+1,a.lons.length-1)]
      )
      const px = ax + (bx-ax)*frac
      const py = ay + (by-ay)*frac

      ctx.beginPath()
      ctx.arc(px,py, (a.tipo==='ballena'?3:1.8)*devicePixelRatio, 0, Math.PI*2)
      ctx.fillStyle = col + '0.7)'
      ctx.fill()

      // halo suave
      ctx.beginPath()
      ctx.arc(px,py, (a.tipo==='ballena'?6:3.5)*devicePixelRatio, 0, Math.PI*2)
      ctx.fillStyle = col + '0.08)'
      ctx.fill()
    })
  }

  // ── BARCOS AIS ──
  if (vivo && barcos.size > 0) {
    const ahora = Date.now()
    barcos.forEach(b => {
      const [bx,by] = proyectar(b.lat, b.lon)
      const edad = (ahora-b.updated)/60000
      const alpha = Math.max(0.06, 0.3-edad*0.04)
      ctx.beginPath()
      ctx.arc(bx,by,1.8*devicePixelRatio,0,Math.PI*2)
      ctx.fillStyle = COL_BARCO+alpha+')'
      ctx.fill()
      if (b.heading && b.heading<360) {
        const rad=(b.heading-90)*Math.PI/180
        const len=6*devicePixelRatio
        ctx.beginPath()
        ctx.moveTo(bx,by)
        ctx.lineTo(bx+Math.cos(rad)*len, by+Math.sin(rad)*len)
        ctx.strokeStyle = COL_BARCO+(alpha*.5)+')'
        ctx.lineWidth=0.4*devicePixelRatio; ctx.stroke()
      }
    })
  }

  // corrientes narrativas
  if (vivo) {
    narrativas.forEach(nav=>{
      const nns=nodosDeNarrativa(nav.id)
      if(nns.length<2) return
      const esActiva=narrativaActiva&&narrativaActiva.id===nav.id
      const alpha=esActiva?.2:.05
      for(let i=0;i<nns.length-1;i++){
        const a=nns[i],b=nns[i+1]; if(!a||!b) continue
        const mx=(a.x+b.x)/2+(b.y-a.y)*.15
        const my=(a.y+b.y)/2-(b.x-a.x)*.15
        ctx.beginPath(); ctx.moveTo(a.x,a.y)
        ctx.quadraticCurveTo(mx,my,b.x,b.y)
        ctx.strokeStyle=rgba(nav.color,alpha)
        ctx.lineWidth=(esActiva?1:.5)*devicePixelRatio
        ctx.setLineDash([]); ctx.stroke()
        if(esActiva){
          const prog=((t*.35+i*.25)%1),t2=1-prog
          const px=t2*t2*a.x+2*t2*prog*mx+prog*prog*b.x
          const py=t2*t2*a.y+2*t2*prog*my+prog*prog*b.y
          ctx.beginPath(); ctx.arc(px,py,2.5*devicePixelRatio,0,Math.PI*2)
          ctx.fillStyle=rgba(nav.color,.7); ctx.fill()
        }
      }
    })
  }

  // ref vectores
  const ref=hover||seleccionado||activo
  if(ref){
    getConns(ref.id).forEach(({nodo:o,peso})=>{
      if(!o) return
      const lg=ctx.createLinearGradient(ref.x,ref.y,o.x,o.y)
      lg.addColorStop(0,rgba(COLS[ref.eje],.6))
      lg.addColorStop(1,rgba(COLS[o.eje],.2))
      const mx=(ref.x+o.x)/2+(o.y-ref.y)*.13
      const my=(ref.y+o.y)/2-(o.x-ref.x)*.13
      ctx.beginPath(); ctx.moveTo(ref.x,ref.y)
      ctx.quadraticCurveTo(mx,my,o.x,o.y)
      ctx.strokeStyle=lg
      ctx.lineWidth=Math.max(.4,(peso/10)*1.5)*devicePixelRatio
      ctx.setLineDash([3*devicePixelRatio,5*devicePixelRatio])
      ctx.stroke(); ctx.setLineDash([])
      ctx.beginPath(); ctx.arc(o.x,o.y,2.5*devicePixelRatio,0,Math.PI*2)
      ctx.fillStyle=rgba(COLS[o.eje],.5); ctx.fill()
    })
  }

  // palabras
  nc.forEach(n=>{
    const esH=n===hover, esSel=n===seleccionado, esA=n===activo
    const esConn=ref&&getConns(ref.id).some(c=>c.nodo===n)
    const enNarrActiva=narrativaActiva&&narrativaNodos.some(nn=>nn.narrativa_id===narrativaActiva.id&&nn.nodo_id===n.id)
    let esNavVecino=false
    if(narrativaActiva&&activo){
      const posAct=posEnNarrativa(narrativaActiva.id,activo.id)
      const posN=posEnNarrativa(narrativaActiva.id,n.id)
      esNavVecino=Math.abs(posN-posAct)===1
    }
    const dim=ref&&!esH&&!esSel&&!esA&&!esConn&&!enNarrActiva
    const fs=(esH||esSel||esA)?n.fs*1.07:n.fs
    ctx.font=`${(esH||esSel||esA)?400:300} ${fs}px ${FONT_WORDS}`
    const w=ctx.measureText(n.nombre).width
    if(esH||esSel||esA||esNavVecino){
      ctx.beginPath()
      ctx.ellipse(n.x,n.y,w/2+16*devicePixelRatio,fs/2+9*devicePixelRatio,0,0,Math.PI*2)
      ctx.fillStyle=rgba(esNavVecino&&narrativaActiva?narrativaActiva.color:COLS[n.eje],(esA||esSel)?.09:.04)
      ctx.fill()
    }
    const al=dim?.06:esH?1:esA?.95:esSel?.9:esNavVecino?.82:esConn?.72:enNarrActiva?.45:ref?.22:vivo?.52:0
    const col=(esNavVecino&&narrativaActiva)?narrativaActiva.color:COLS[n.eje]
    ctx.fillStyle=rgba(col,al)
    ctx.textAlign='center'; ctx.textBaseline='middle'
    ctx.fillText(n.nombre,n.x,n.y)
    if(esH||esSel||esA||esConn||esNavVecino){
      ctx.beginPath()
      ctx.moveTo(n.x-w/2,n.y+fs/2+2*devicePixelRatio)
      ctx.lineTo(n.x+w/2,n.y+fs/2+2*devicePixelRatio)
      ctx.strokeStyle=rgba(col,(esH||esSel||esA)?.65:.25)
      ctx.lineWidth=((esH||esSel||esA)?1:.4)*devicePixelRatio; ctx.stroke()
    }
  })

  requestAnimationFrame(frame)
}

// ── HELPERS ───────────────────────────────────────────────────────
function nodosDeNarrativa(navId){
  return narrativaNodos.filter(nn=>nn.narrativa_id===navId).sort((a,b)=>a.orden-b.orden).map(nn=>nc.find(n=>n.id===nn.nodo_id)).filter(Boolean)
}
function narrativasDeNodo(nodoId){
  const navIds=[...new Set(narrativaNodos.filter(nn=>nn.nodo_id===nodoId).map(nn=>nn.narrativa_id))]
  return narrativas.filter(nav=>navIds.includes(nav.id))
}
function posEnNarrativa(navId,nodoId){
  const nn=narrativaNodos.find(n=>n.narrativa_id===navId&&n.nodo_id===nodoId)
  return nn?nn.orden:-1
}
function getConns(id){
  return conxs.filter(c=>c.nodo_origen===id||(c.bidireccional&&c.nodo_destino===id))
    .map(c=>{
      const did=c.nodo_origen===id?c.nodo_destino:c.nodo_origen
      const bon=historial.filter(h=>h===did).length*1.5
      return {nodo:nc.find(n=>n.id===did),peso:Math.min(10,c.peso+bon),tipo:c.tipo_relacion}
    }).filter(c=>c.nodo).sort((a,b)=>b.peso-a.peso)
}
function rgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16)
  return `rgba(${r},${g},${b},${a})`
}

// ── SELECCIONAR ───────────────────────────────────────────────────
function seleccionar(nodo){
  if(seleccionado===nodo){abrirPanel(nodo);return}
  seleccionado=nodo
  narrativaActiva=narrativasDeNodo(nodo.id)[0]||null
  hint.textContent=`∿ click de nuevo para explorar ${nodo.nombre}`
  hint.style.opacity='1'; setTimeout(()=>{hint.style.opacity='0'},2500)
}

async function abrirPanel(nodo){
  activo=nodo; seleccionado=nodo; historial.push(nodo.id); hint.style.opacity='0'
  narrativaActiva=narrativasDeNodo(nodo.id)[0]||null
  mapa.classList.add('partido'); panel.classList.add('visible')
  setTimeout(redim,680)
  document.getElementById('panel-nombre').textContent=nodo.nombre
  const ejEl=document.getElementById('panel-eje'); ejEl.textContent=nodo.eje; ejEl.style.color=COLS[nodo.eje]
  const navBadge=document.getElementById('panel-narrativa')
  const navNombreEl=document.getElementById('panel-narrativa-nombre')
  const navDot2=document.getElementById('panel-narrativa-dot')
  if(narrativaActiva){navNombreEl.textContent=narrativaActiva.nombre;navDot2.style.background=narrativaActiva.color;navBadge.classList.add('visible')}
  else{navBadge.classList.remove('visible')}
  const navNav=document.getElementById('panel-nav-narrativa')
  const btnPrev=document.getElementById('btn-prev'), btnNext=document.getElementById('btn-next')
  if(narrativaActiva){
    const nns=nodosDeNarrativa(narrativaActiva.id), idx=nns.findIndex(n=>n.id===nodo.id)
    navNav.classList.add('visible'); btnPrev.disabled=idx<=0; btnNext.disabled=idx>=nns.length-1
  } else { navNav.classList.remove('visible') }
  document.getElementById('panel-txt').textContent=nodo.texto_principal||''
  const img=document.getElementById('panel-img'); img.classList.remove('ok','hide'); img.src=''
  let frag=null
  if(historial.length>1){
    const prev=historial[historial.length-2]
    const {data:cf}=await db.from('fragmentos').select('*').eq('nodo_id',nodo.id).eq('contexto_previo',prev).limit(1)
    if(cf?.length) frag=cf[0]
  }
  if(!frag){const {data:f}=await db.from('fragmentos').select('*').eq('nodo_id',nodo.id).order('orden').limit(1);frag=f?.[0]||null}
  if(frag?.tipo==='imagen'&&frag?.url){img.src=frag.url;img.onload=()=>img.classList.add('ok')}
  else{img.classList.add('hide')}
  const lista=document.getElementById('panel-asocs'); lista.innerHTML=''
  getConns(nodo.id).slice(0,7).forEach(({nodo:o,peso,tipo})=>{
    if(!o) return
    const enNav=narrativaActiva&&narrativaNodos.some(nn=>nn.narrativa_id===narrativaActiva.id&&nn.nodo_id===o.id)
    const col=enNav&&narrativaActiva?narrativaActiva.color:COLS[o.eje]
    const el=document.createElement('div')
    el.style.cssText=`display:flex;align-items:center;gap:.6rem;margin-bottom:.85rem;cursor:pointer;opacity:.35;transition:opacity .3s;`
    el.onmouseenter=()=>el.style.opacity=1; el.onmouseleave=()=>el.style.opacity=.35
    el.innerHTML=`<div style="width:${peso*3}px;height:1px;background:${col};opacity:.5;flex-shrink:0"></div><span style="font-size:.75rem;letter-spacing:.06em;color:${col};font-family:'Barlow Condensed',sans-serif;font-weight:300">${o.nombre}</span><span style="font-size:.48rem;letter-spacing:.2em;color:rgba(255,255,255,.15);text-transform:lowercase">${tipo||''}</span>${enNav?`<span style="font-size:.42rem;color:${col};opacity:.6">∿</span>`:''}`
    el.onclick=()=>{seleccionado=o;abrirPanel(o)}
    lista.appendChild(el)
  })
}

function navNarrativa(dir){
  if(!narrativaActiva||!activo) return
  const nns=nodosDeNarrativa(narrativaActiva.id), idx=nns.findIndex(n=>n.id===activo.id)
  const sig=nns[idx+dir]; if(sig){seleccionado=sig;abrirPanel(sig)}
}

function cerrar(){
  panel.classList.remove('visible','fullscreen'); mapa.classList.remove('partido')
  activo=null; seleccionado=null; narrativaActiva=null
  document.getElementById('btn-fs').textContent='⤢ expandir'
  setTimeout(redim,680)
}

function toggleFS(){
  panel.classList.toggle('fullscreen')
  const fs=panel.classList.contains('fullscreen')
  mapa.style.display=fs?'none':'block'
  document.getElementById('btn-fs').textContent=fs?'⤡ contraer':'⤢ expandir'
  setTimeout(redim,680)
}

function hundirse(){
  const v=document.getElementById('velo'); v.classList.add('on')
  setTimeout(()=>{
    document.getElementById('superficie').classList.add('oculto')
    vivo=true
    document.getElementById('leyenda').classList.add('visible')
    document.getElementById('indicadores').classList.add('visible')
    v.classList.remove('on')
    conectarAIS()
    cargarMovebank()
  },700)
}

// ── EVENTOS ───────────────────────────────────────────────────────
function find(px,py){
  return nc.slice().reverse().find(n=>{
    ctx.font=`300 ${n.fs}px ${FONT_WORDS}`
    const w=ctx.measureText(n.nombre).width, m=14*devicePixelRatio
    return px>=n.x-w/2-m&&px<=n.x+w/2+m&&py>=n.y-n.fs/2-m&&py<=n.y+n.fs/2+m
  })
}
function pos(e){
  const r=cvs.getBoundingClientRect(), touch=e.touches?.[0]||e
  return [(touch.clientX-r.left)*devicePixelRatio,(touch.clientY-r.top)*devicePixelRatio]
}
cvs.addEventListener('mousemove',e=>{
  if(!vivo) return
  const [px,py]=pos(e); hover=find(px,py)||null
  cvs.style.cursor=hover?'pointer':'default'
  if(drag){drag.ox=(px-ddx)/devicePixelRatio;drag.oy=(py-ddy)/devicePixelRatio}
})
cvs.addEventListener('mouseleave',()=>{hover=null})
cvs.addEventListener('mousedown',e=>{
  const [px,py]=pos(e); clickX=px; clickY=py
  const n=find(px,py); if(n){drag=n;ddx=px-n.ox*devicePixelRatio;ddy=py-n.oy*devicePixelRatio}
})
cvs.addEventListener('mouseup',e=>{
  const [px,py]=pos(e), moved=Math.hypot(px-clickX,py-clickY)>5*devicePixelRatio
  const n=find(px,py)
  if(n&&!moved){seleccionar(n)}
  else if(!n&&!moved){seleccionado=null;activo=null;narrativaActiva=null;if(panel.classList.contains('visible'))cerrar()}
  drag=null
})
cvs.addEventListener('touchstart',e=>{
  if(!vivo) return
  const [px,py]=pos(e), n=find(px,py)
  if(n){seleccionar(n)}else{seleccionado=null;activo=null;narrativaActiva=null;if(panel.classList.contains('visible'))cerrar()}
},{passive:true})
window.addEventListener('resize',redim)

init()
</script>
