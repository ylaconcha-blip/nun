<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NùN — memoria oceánica</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --desastre:   #378ADD;
  --mitologia:  #7F77DD;
  --geopolitica:#D85A30;
  --biologia:   #1D9E75;
  --antropoceno:#BA7517;
  --bg: #050810;
}

body {
  background: var(--bg);
  font-family: 'Georgia', serif;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}

/* ── MAPA ── */
#mapa {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  transition: width 0.65s cubic-bezier(0.4,0,0.2,1),
              transform 0.65s cubic-bezier(0.4,0,0.2,1);
  z-index: 1;
}

/* cuando el panel está abierto: mapa ocupa 2/3 y se escala levemente */
#mapa.partido {
  width: 67%;
  transform: scale(0.96);
  transform-origin: center center;
}

canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* ── SUPERFICIE ── */
#superficie {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: opacity 1.5s ease;
}

#superficie.oculto {
  opacity: 0;
  pointer-events: none;
}

#titulo {
  font-size: clamp(5rem, 13vw, 10rem);
  font-weight: 300;
  letter-spacing: 0.35em;
  color: white;
  opacity: 0;
  animation: subir 2s ease 0.4s forwards;
}

#sub {
  font-size: clamp(0.7rem, 1.5vw, 0.9rem);
  letter-spacing: 0.5em;
  color: rgba(255,255,255,0.35);
  margin-top: 0.5rem;
  margin-bottom: 5rem;
  opacity: 0;
  animation: subir 2s ease 1s forwards;
  text-transform: lowercase;
}

#btn-hundirse {
  background: none;
  border: none;
  color: rgba(255,255,255,0.2);
  font-family: 'Georgia', serif;
  font-size: 0.75rem;
  letter-spacing: 0.6em;
  cursor: pointer;
  text-transform: lowercase;
  opacity: 0;
  animation: subir 2s ease 2.2s forwards;
  transition: color 0.6s;
}

#btn-hundirse:hover { color: rgba(255,255,255,0.6); }

#nav {
  position: fixed;
  top: 1.8rem; right: 2rem;
  display: flex;
  gap: 2.5rem;
  z-index: 110;
  opacity: 0;
  animation: subir 1s ease 3s forwards;
}

#nav a {
  color: rgba(255,255,255,0.2);
  text-decoration: none;
  font-size: 0.65rem;
  letter-spacing: 0.35em;
  text-transform: lowercase;
  transition: color 0.4s;
}

#nav a:hover { color: rgba(255,255,255,0.55); }

/* ── PANEL 1/3 ── */
#panel {
  position: fixed;
  top: 0; right: 0;
  width: 33%;
  height: 100%;
  background: rgba(5,8,16,0.97);
  border-left: 1px solid rgba(255,255,255,0.05);
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.65s cubic-bezier(0.4,0,0.2,1);
  z-index: 40;
  overflow: hidden;
}

#panel.visible { transform: translateX(0); }

#panel.fullscreen {
  width: 100%;
  border-left: none;
}

/* ── HEADER ── */
#panel-header {
  padding: 2rem 2rem 1.2rem;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-shrink: 0;
}

#panel-nombre {
  font-size: clamp(1.4rem, 2.5vw, 2.2rem);
  font-weight: 300;
  letter-spacing: 0.12em;
  color: white;
  line-height: 1;
}

#panel-eje {
  font-size: 0.55rem;
  letter-spacing: 0.4em;
  text-transform: lowercase;
  margin-top: 0.5rem;
  opacity: 0.6;
}

/* botones header */
#header-btns {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 0.6rem;
  flex-shrink: 0;
}

#btn-cerrar {
  background: none;
  border: none;
  color: rgba(255,255,255,0.35);
  cursor: pointer;
  font-size: 1.1rem;
  line-height: 1;
  transition: color 0.3s;
  padding: 0;
}

#btn-cerrar:hover { color: rgba(255,255,255,0.8); }

#btn-fs {
  background: none;
  border: none;
  color: rgba(255,255,255,0.15);
  cursor: pointer;
  font-size: 0.55rem;
  letter-spacing: 0.3em;
  text-transform: lowercase;
  font-family: 'Georgia', serif;
  transition: color 0.4s;
}

#btn-fs:hover { color: rgba(255,255,255,0.45); }

/* ── BODY ── */
#panel-body {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: none;
}

#panel-body::-webkit-scrollbar { display: none; }

#panel-img {
  width: 100%;
  max-height: 45vh;
  object-fit: cover;
  display: block;
  opacity: 0;
  transition: opacity 1s ease;
}

#panel-img.ok   { opacity: 1; }
#panel-img.hide { display: none; }

#panel-txt {
  padding: 1.5rem 2rem;
  font-size: 0.82rem;
  line-height: 1.9;
  color: rgba(255,255,255,0.5);
}

/* ── FOOTER / ASOCIACIONES ── */
#panel-footer {
  padding: 1.2rem 2rem 1.8rem;
  border-top: 1px solid rgba(255,255,255,0.04);
  flex-shrink: 0;
}

#footer-label {
  font-size: 0.5rem;
  letter-spacing: 0.45em;
  text-transform: lowercase;
  color: rgba(255,255,255,0.12);
  margin-bottom: 1rem;
}

/* ── LEYENDA ── */
#leyenda {
  position: fixed;
  bottom: 1.8rem; left: 1.8rem;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  z-index: 30;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1s ease;
}

#leyenda.visible { opacity: 0.3; }

.li {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.52rem;
  letter-spacing: 0.2em;
  text-transform: lowercase;
  color: rgba(255,255,255,0.9);
}

.ld {
  width: 4px; height: 4px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── HINT click estado ── */
#hint {
  position: fixed;
  bottom: 1.8rem;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.55rem;
  letter-spacing: 0.35em;
  color: rgba(255,255,255,0.12);
  text-transform: lowercase;
  z-index: 30;
  pointer-events: none;
  transition: opacity 0.5s;
  white-space: nowrap;
}

/* ── VELO ── */
#velo {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.7s ease;
}

#velo.on { opacity: 1; }

@keyframes subir {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
</style>
</head>
<body>

<div id="velo"></div>

<div id="mapa"><canvas id="c"></canvas></div>

<!-- SUPERFICIE -->
<div id="superficie">
  <nav id="nav">
    <a href="#">proyecto</a>
    <a href="#">archivo</a>
  </nav>
  <h1 id="titulo">NùN</h1>
  <p id="sub">memoria oceánica</p>
  <button id="btn-hundirse" onclick="hundirse()">∿ hundirse</button>
</div>

<!-- PANEL -->
<div id="panel">
  <div id="panel-header">
    <div>
      <div id="panel-nombre"></div>
      <div id="panel-eje"></div>
    </div>
    <div id="header-btns">
      <button id="btn-cerrar" onclick="cerrar()" title="cerrar">×</button>
      <button id="btn-fs" onclick="toggleFS()">⤢ expandir</button>
    </div>
  </div>
  <div id="panel-body">
    <img id="panel-img" src="" alt="">
    <p id="panel-txt"></p>
  </div>
  <div id="panel-footer">
    <div id="footer-label">asociaciones</div>
    <div id="panel-asocs"></div>
  </div>
</div>

<!-- LEYENDA -->
<div id="leyenda">
  <div class="li"><div class="ld" style="background:var(--desastre)"></div>desastre natural</div>
  <div class="li"><div class="ld" style="background:var(--mitologia)"></div>mitología</div>
  <div class="li"><div class="ld" style="background:var(--geopolitica)"></div>geopolítica</div>
  <div class="li"><div class="ld" style="background:var(--biologia)"></div>biología especulativa</div>
  <div class="li"><div class="ld" style="background:var(--antropoceno)"></div>antropoceno</div>
</div>

<div id="hint"></div>

<script>
const SURL = 'https://uwduhddojpodzyvipbrq.supabase.co'
const SKEY = 'sb_publishable_V38s6emQE9jMQ54WhSIlJw_7WzJhGFY'
const { createClient } = supabase
const db = createClient(SURL, SKEY)

const COLS = {
  desastre:'#378ADD', mitologia:'#7F77DD',
  geopolitica:'#D85A30', biologia:'#1D9E75', antropoceno:'#BA7517'
}

let nodos=[], conxs=[], nc=[]
// seleccionado = 1er click (muestra relaciones), activo = 2do click (abre panel)
let hover=null, seleccionado=null, activo=null
let historial=[], vivo=false
let t=0, drag=null, ddx=0, ddy=0
let clickX=0, clickY=0

const cvs = document.getElementById('c')
const ctx = cvs.getContext('2d')
const mapa = document.getElementById('mapa')
const panel = document.getElementById('panel')
const hint = document.getElementById('hint')

// ── CARGA ─────────────────────────────────────────────────────────
async function init() {
  const [{ data:n },{ data:c }] = await Promise.all([
    db.from('nodos').select('*').eq('activo',true),
    db.from('conexiones').select('*')
  ])
  nodos = n||[]; conxs = c||[]
  setup()
}

function setup() {
  redim()
  nc = nodos.map((n,i) => {
    const a = (i/nodos.length)*Math.PI*2
    const r = 0.2 + Math.random()*0.22
    const x = cvs.width/2 + Math.cos(a)*cvs.width*r
    const y = cvs.height/2 + Math.sin(a)*cvs.height*r*0.62
    return { ...n, x, y, ox:x, oy:y,
      fase: Math.random()*Math.PI*2,
      vel:  0.22+Math.random()*0.32,
      amp:  (4+Math.random()*6)*devicePixelRatio,
      fs:   (12+Math.random()*4)*devicePixelRatio
    }
  })
  frame()
}

function redim() {
  const w = mapa.offsetWidth
  const h = window.innerHeight
  cvs.width  = w * devicePixelRatio
  cvs.height = h * devicePixelRatio
  cvs.style.width  = w + 'px'
  cvs.style.height = h + 'px'
}

// ── RENDER ────────────────────────────────────────────────────────
function frame() {
  t += 0.006
  ctx.clearRect(0,0,cvs.width,cvs.height)

  const g = ctx.createRadialGradient(
    cvs.width/2,cvs.height/2,0,
    cvs.width/2,cvs.height/2,cvs.width*.65
  )
  g.addColorStop(0,'rgba(12,22,55,0.1)')
  g.addColorStop(1,'rgba(0,0,0,0)')
  ctx.fillStyle=g; ctx.fillRect(0,0,cvs.width,cvs.height)

  // flotar
  nc.forEach(n => {
    if(n===drag) return
    n.x = n.ox + Math.sin(t*n.vel+n.fase)*n.amp
    n.y = n.oy + Math.cos(t*n.vel*.7+n.fase*1.4)*n.amp*.55
  })

  // referencia para vectores: hover > seleccionado > activo
  const ref = hover || seleccionado || activo

  // vectores
  if(ref) {
    getConns(ref.id).forEach(({nodo:o,peso}) => {
      if(!o) return
      const lg = ctx.createLinearGradient(ref.x,ref.y,o.x,o.y)
      lg.addColorStop(0, rgba(COLS[ref.eje],.65))
      lg.addColorStop(1, rgba(COLS[o.eje],.22))
      const mx=(ref.x+o.x)/2+(o.y-ref.y)*.13
      const my=(ref.y+o.y)/2-(o.x-ref.x)*.13
      ctx.beginPath(); ctx.moveTo(ref.x,ref.y)
      ctx.quadraticCurveTo(mx,my,o.x,o.y)
      ctx.strokeStyle=lg
      ctx.lineWidth=Math.max(.4,(peso/10)*1.6)*devicePixelRatio
      ctx.setLineDash([3*devicePixelRatio,5*devicePixelRatio])
      ctx.stroke(); ctx.setLineDash([])
      // punto destino
      ctx.beginPath()
      ctx.arc(o.x,o.y,2.5*devicePixelRatio,0,Math.PI*2)
      ctx.fillStyle=rgba(COLS[o.eje],.5); ctx.fill()
    })
  }

  // palabras
  nc.forEach(n => {
    const esH  = n===hover
    const esSel= n===seleccionado
    const esA  = n===activo
    const esC  = ref && getConns(ref.id).some(c=>c.nodo===n)
    const dim  = ref && !esH && !esSel && !esA && !esC

    const fs = (esH||esSel||esA) ? n.fs*1.08 : n.fs
    ctx.font=`${(esH||esSel||esA)?400:300} ${fs}px Georgia,serif`
    const w = ctx.measureText(n.nombre).width

    if(esH||esSel||esA) {
      ctx.beginPath()
      ctx.ellipse(n.x,n.y,w/2+16*devicePixelRatio,fs/2+9*devicePixelRatio,0,0,Math.PI*2)
      ctx.fillStyle=rgba(COLS[n.eje],(esA||esSel)?.1:.05)
      ctx.fill()
    }

    const al = dim?.07
      : esH   ? 1
      : esA   ? .95
      : esSel ? .9
      : esC   ? .8
      : ref   ? .28
      : vivo  ? .58
      : 0

    ctx.fillStyle=rgba(COLS[n.eje],al)
    ctx.textAlign='center'; ctx.textBaseline='middle'
    ctx.fillText(n.nombre,n.x,n.y)

    if(esH||esSel||esA||esC) {
      ctx.beginPath()
      ctx.moveTo(n.x-w/2, n.y+fs/2+2*devicePixelRatio)
      ctx.lineTo(n.x+w/2, n.y+fs/2+2*devicePixelRatio)
      ctx.strokeStyle=rgba(COLS[n.eje],(esH||esSel||esA)?.7:.28)
      ctx.lineWidth=((esH||esSel||esA)?1:.4)*devicePixelRatio
      ctx.stroke()
    }
  })

  requestAnimationFrame(frame)
}

// ── CONEXIONES ────────────────────────────────────────────────────
function getConns(id) {
  return conxs
    .filter(c=>c.nodo_origen===id||(c.bidireccional&&c.nodo_destino===id))
    .map(c=>{
      const did = c.nodo_origen===id ? c.nodo_destino : c.nodo_origen
      const bon = historial.filter(h=>h===did).length*1.5
      return { nodo:nc.find(n=>n.id===did), peso:Math.min(10,c.peso+bon), tipo:c.tipo_relacion }
    })
    .filter(c=>c.nodo)
    .sort((a,b)=>b.peso-a.peso)
}

// ── PRIMER CLICK: seleccionar (mostrar relaciones) ────────────────
function seleccionar(nodo) {
  if(seleccionado===nodo) {
    // segundo click en el mismo nodo → abrir panel
    abrirPanel(nodo)
    return
  }
  seleccionado = nodo
  activo = null
  // hint
  hint.textContent = `∿ click de nuevo para explorar ${nodo.nombre}`
  hint.style.opacity = '1'
  setTimeout(()=>{ hint.style.opacity='0' }, 2500)
}

// ── SEGUNDO CLICK: abrir panel ────────────────────────────────────
async function abrirPanel(nodo) {
  activo = nodo
  seleccionado = nodo
  historial.push(nodo.id)
  hint.style.opacity = '0'

  mapa.classList.add('partido')
  panel.classList.add('visible')
  setTimeout(redim, 680)

  // header
  document.getElementById('panel-nombre').textContent = nodo.nombre
  const ejEl = document.getElementById('panel-eje')
  ejEl.textContent = nodo.eje
  ejEl.style.color = COLS[nodo.eje]
  document.getElementById('panel-txt').textContent = nodo.texto_principal||''

  // imagen
  const img = document.getElementById('panel-img')
  img.classList.remove('ok','hide'); img.src=''

  let frag = null
  if(historial.length>1) {
    const prev = historial[historial.length-2]
    const {data:cf} = await db.from('fragmentos').select('*')
      .eq('nodo_id',nodo.id).eq('contexto_previo',prev).limit(1)
    if(cf?.length) frag=cf[0]
  }
  if(!frag) {
    const {data:f} = await db.from('fragmentos').select('*')
      .eq('nodo_id',nodo.id).order('orden').limit(1)
    frag=f?.[0]||null
  }

  if(frag?.tipo==='imagen'&&frag?.url) {
    img.src=frag.url; img.onload=()=>img.classList.add('ok')
  } else { img.classList.add('hide') }

  // asociaciones
  const lista = document.getElementById('panel-asocs')
  lista.innerHTML=''
  getConns(nodo.id).slice(0,7).forEach(({nodo:o,peso,tipo})=>{
    if(!o) return
    const el = document.createElement('div')
    el.style.cssText=`display:flex;align-items:center;gap:.6rem;
      margin-bottom:.85rem;cursor:pointer;opacity:.38;transition:opacity .3s;`
    el.onmouseenter=()=>el.style.opacity=1
    el.onmouseleave=()=>el.style.opacity=.38
    el.innerHTML=`
      <div style="width:${peso*3}px;height:1px;background:${COLS[o.eje]};
        opacity:.5;flex-shrink:0"></div>
      <span style="font-size:.78rem;letter-spacing:.07em;color:${COLS[o.eje]}">${o.nombre}</span>
      <span style="font-size:.5rem;letter-spacing:.2em;color:rgba(255,255,255,.18);
        text-transform:lowercase">${tipo||''}</span>`
    el.onclick=()=>{ seleccionado=o; abrirPanel(o) }
    lista.appendChild(el)
  })
}

// ── CERRAR PANEL ──────────────────────────────────────────────────
function cerrar() {
  panel.classList.remove('visible','fullscreen')
  mapa.classList.remove('partido')
  activo=null; seleccionado=null
  document.getElementById('btn-fs').textContent='⤢ expandir'
  setTimeout(redim, 680)
}

function toggleFS() {
  panel.classList.toggle('fullscreen')
  const fs = panel.classList.contains('fullscreen')
  mapa.style.display = fs ? 'none' : 'block'
  document.getElementById('btn-fs').textContent = fs ? '⤡ contraer' : '⤢ expandir'
  setTimeout(redim, 680)
}

// ── HUNDIRSE ──────────────────────────────────────────────────────
function hundirse() {
  const v = document.getElementById('velo')
  v.classList.add('on')
  setTimeout(()=>{
    document.getElementById('superficie').classList.add('oculto')
    vivo = true
    document.getElementById('leyenda').classList.add('visible')
    v.classList.remove('on')
  }, 700)
}

// ── EVENTOS CANVAS ────────────────────────────────────────────────
function find(px, py) {
  return nc.slice().reverse().find(n => {
    ctx.font = `300 ${n.fs}px Georgia, serif`
    const w = ctx.measureText(n.nombre).width
    const h = n.fs
    const margen = 14 * devicePixelRatio
    return px >= n.x - w/2 - margen
        && px <= n.x + w/2 + margen
        && py >= n.y - h/2 - margen
        && py <= n.y + h/2 + margen
  })
}

function pos(e) {
  const r = cvs.getBoundingClientRect()
  const touch = e.touches?.[0]||e
  return [
    (touch.clientX-r.left)*devicePixelRatio,
    (touch.clientY-r.top)*devicePixelRatio
  ]
}

cvs.addEventListener('mousemove', e=>{
  if(!vivo) return
  const [px,py] = pos(e)
  hover = find(px,py)||null
  cvs.style.cursor = hover ? 'pointer' : 'default'
  if(drag){
    drag.ox = (px-ddx)/devicePixelRatio
    drag.oy = (py-ddy)/devicePixelRatio
  }
})

cvs.addEventListener('mouseleave', ()=>{ hover=null })

cvs.addEventListener('mousedown', e=>{
  const [px,py] = pos(e)
  clickX=px; clickY=py
  const n = find(px,py)
  if(n){ drag=n; ddx=px-n.ox*devicePixelRatio; ddy=py-n.oy*devicePixelRatio }
})

cvs.addEventListener('mouseup', e=>{
  const [px,py] = pos(e)
  const moved = Math.hypot(px-clickX,py-clickY) > 5*devicePixelRatio
  const n = find(px,py)
  if(n && !moved) seleccionar(n)
  drag=null
})

cvs.addEventListener('touchstart', e=>{
  if(!vivo) return
  const [px,py] = pos(e)
  const n = find(px,py)
  if(n) seleccionar(n)
},{passive:true})

window.addEventListener('resize', redim)

// ── UTILS ─────────────────────────────────────────────────────────
function rgba(hex,a){
  const r=parseInt(hex.slice(1,3),16)
  const g=parseInt(hex.slice(3,5),16)
  const b=parseInt(hex.slice(5,7),16)
  return `rgba(${r},${g},${b},${a})`
}

init()
</script>
</body>
</html>
