canvas {

}

<script>
const SURL = 'https://uwduhddojpodzyvipbrq.supabase.co'
const SKEY = 'sb_publishable_V38s6emQE9jMQ54WhSIlJw_7WzJhGFY'
const AIS_KEY = 'f233b8fe03520713d0d9f0b013e79324a5195365'

const { createClient } = supabase
const db = createClient(SURL, SKEY)

const COLS = {
  desastre:'#378ADD', mitologia:'#7F77DD',
  geopolitica:'#D85A30', biologia:'#1D9E75', antropoceno:'#BA7517'
}

const FONT_WORDS = "'Barlow Condensed', sans-serif"

// área del Pacífico frente a Chile y Perú
const AIS_BOUNDS = {
  latMin: -60, latMax: -10,
  lonMin: -90, lonMax: -60
}

// fondo sonar
const bgImg = new Image()
bgImg.crossOrigin = 'anonymous'
bgImg.src = 'https://uwduhddojpodzyvipbrq.supabase.co/storage/v1/object/public/nun-media/seabed%20sonar%20mapping.jpg'

let nodos=[], conxs=[], narrativas=[], narrativaNodos=[]
let nc=[]
let hover=null, seleccionado=null, activo=null
let historial=[], vivo=false
let t=0, drag=null, ddx=0, ddy=0, clickX=0, clickY=0
let narrativaActiva=null

// barcos AIS — mapa mmsi → {lat, lon, heading, updated}
const barcos = new Map()
let aisWs = null
let aisConectado = false

const cvs = document.getElementById('c')
const ctx = cvs.getContext('2d')
const mapa = document.getElementById('mapa')
const panel = document.getElementById('panel')
const hint = document.getElementById('hint')
const aisDot = document.getElementById('ais-dot')
const aisCount = document.getElementById('ais-count')

// ── CARGA SUPABASE ────────────────────────────────────────────────
async function init() {
  const [{ data:n },{ data:c },{ data:nav },{ data:nn }] = await Promise.all([
    db.from('nodos').select('*').eq('activo',true),
    db.from('conexiones').select('*'),
    db.from('narrativas').select('*'),
    db.from('narrativa_nodos').select('*').order('orden')
  ])
  nodos=n||[]; conxs=c||[]
  narrativas=nav||[]; narrativaNodos=nn||[]
  renderLeyendaNarrativas()
  setup()
}

function renderLeyendaNarrativas() {
  const cont = document.getElementById('leyenda-narrativas')
  narrativas.forEach(nav => {
    const el = document.createElement('div')
    el.className = 'li'
    el.innerHTML = `<div class="ln" style="background:${nav.color};opacity:0.6"></div><span>${nav.nombre}</span>`
    cont.appendChild(el)
  })
}

// ── AIS WEBSOCKET ─────────────────────────────────────────────────
function conectarAIS() {
  if (aisWs) aisWs.close()

  aisWs = new WebSocket(`wss://stream.aisstream.io/v0/stream`)

  aisWs.onopen = () => {
    aisConectado = true
    aisDot.classList.add('conectado', 'pulso')
    document.getElementById('ais-status').classList.add('visible')

    // suscribir al área del Pacífico sur
    const sub = {
      APIKey: AIS_KEY,
      BoundingBoxes: [[
        [AIS_BOUNDS.latMin, AIS_BOUNDS.lonMin],
        [AIS_BOUNDS.latMax, AIS_BOUNDS.lonMax]
      ]],
      FilterMessageTypes: ['PositionReport']
    }
    aisWs.send(JSON.stringify(sub))
  }

  aisWs.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data)
      if (msg.MessageType !== 'PositionReport') return
      const pos = msg.Message?.PositionReport
      if (!pos) return
      const mmsi = pos.UserId
      const lat  = pos.Latitude
      const lon  = pos.Longitude
      // filtrar posiciones inválidas
      if (!lat || !lon || lat === 0 || lon === 0) return
      if (lat < AIS_BOUNDS.latMin || lat > AIS_BOUNDS.latMax) return
      if (lon < AIS_BOUNDS.lonMin || lon > AIS_BOUNDS.lonMax) return

      barcos.set(mmsi, {
        lat, lon,
        heading: pos.TrueHeading || pos.CourseOverGround || 0,
        updated: Date.now()
      })

      // limpiar barcos viejos (>10 min)
      const ahora = Date.now()
      barcos.forEach((v, k) => {
        if (ahora - v.updated > 600000) barcos.delete(k)
      })

      aisCount.textContent = barcos.size > 0 ? `${barcos.size}` : ''
    } catch(err) {
      // ignorar mensajes malformados
    }
  }

  aisWs.onerror = () => {
    aisConectado = false
    aisDot.classList.remove('conectado', 'pulso')
  }

  aisWs.onclose = () => {
    aisConectado = false
    aisDot.classList.remove('conectado')
    // reconectar tras 10 segundos
    setTimeout(conectarAIS, 10000)
  }
}

// proyectar lat/lon a coordenadas del canvas
function proyectar(lat, lon) {
  const x = ((lon - AIS_BOUNDS.lonMin) / (AIS_BOUNDS.lonMax - AIS_BOUNDS.lonMin)) * cvs.width
  const y = ((AIS_BOUNDS.latMax - lat) / (AIS_BOUNDS.latMax - AIS_BOUNDS.latMin)) * cvs.height
  return [x, y]
}

// ── SETUP ─────────────────────────────────────────────────────────
function setup() {
  redim()
  nc = nodos.map((n, i) => {
    const a = (i / nodos.length) * Math.PI * 2
    const r = 0.2 + Math.random() * 0.22
    const x = cvs.width / 2 + Math.cos(a) * cvs.width * r
    const y = cvs.height / 2 + Math.sin(a) * cvs.height * r * 0.62

    const numConns = conxs.filter(c =>
      c.nodo_origen === n.id || (c.bidireccional && c.nodo_destino === n.id)
    ).length
    const fsBase = Math.max(10, 10 + Math.min(numConns * 1.0, 10))

    return {
      ...n, x, y, ox:x, oy:y,
      fase: Math.random()*Math.PI*2,
      vel:  0.18+Math.random()*0.25,
      amp:  (4+Math.random()*5)*devicePixelRatio,
      fs:   fsBase*devicePixelRatio
    }
  })
  frame()
}

function redim() {
  const w = mapa.offsetWidth
  const h = window.innerHeight
  cvs.width  = w*devicePixelRatio
  cvs.height = h*devicePixelRatio
  cvs.style.width  = w+'px'
  cvs.style.height = h+'px'
}

// ── RENDER ────────────────────────────────────────────────────────
function frame() {
  t += 0.005
  ctx.clearRect(0,0,cvs.width,cvs.height)

  // fondo sonar
  if (bgImg.complete && bgImg.naturalWidth > 0) {
    ctx.save()
    ctx.globalAlpha = 0.06
    ctx.drawImage(bgImg,0,0,cvs.width,cvs.height)
    ctx.restore()
  }

  // viñeta
  const g = ctx.createRadialGradient(
    cvs.width/2,cvs.height/2,0,
    cvs.width/2,cvs.height/2,cvs.width*.7
  )
  g.addColorStop(0,'rgba(5,8,16,0)')
  g.addColorStop(1,'rgba(5,8,16,0.75)')
  ctx.fillStyle=g; ctx.fillRect(0,0,cvs.width,cvs.height)

  // flotar
  nc.forEach(n => {
    if(n===drag) return
    n.x = n.ox + Math.sin(t*n.vel+n.fase)*n.amp
    n.y = n.oy + Math.cos(t*n.vel*.7+n.fase*1.4)*n.amp*.55
  })

  // ── BARCOS AIS ──
  if (vivo && barcos.size > 0) {
    const ahora = Date.now()
    barcos.forEach((b) => {
      const [bx, by] = proyectar(b.lat, b.lon)
      const edad = (ahora - b.updated) / 60000 // minutos
      const alpha = Math.max(0.08, 0.35 - edad * 0.04)

      // punto del barco
      ctx.beginPath()
      ctx.arc(bx, by, 2*devicePixelRatio, 0, Math.PI*2)
      ctx.fillStyle = `rgba(180,160,100,${alpha})`
      ctx.fill()

      // estela de dirección
      if (b.heading && b.heading < 360) {
        const rad = (b.heading - 90) * Math.PI / 180
        const len = 8 * devicePixelRatio
        ctx.beginPath()
        ctx.moveTo(bx, by)
        ctx.lineTo(bx + Math.cos(rad)*len, by + Math.sin(rad)*len)
        ctx.strokeStyle = `rgba(180,160,100,${alpha * 0.5})`
        ctx.lineWidth = 0.5 * devicePixelRatio
        ctx.stroke()
      }
    })
  }

  // corrientes narrativas
  if (vivo) {
    narrativas.forEach(nav => {
      const nns = nodosDeNarrativa(nav.id)
      if (nns.length < 2) return
      const esActiva = narrativaActiva && narrativaActiva.id === nav.id
      const alpha = esActiva ? 0.2 : 0.05

      for (let i=0; i<nns.length-1; i++) {
        const a=nns[i], b=nns[i+1]
        if(!a||!b) continue
        const mx=(a.x+b.x)/2+(b.y-a.y)*.15
        const my=(a.y+b.y)/2-(b.x-a.x)*.15
        ctx.beginPath(); ctx.moveTo(a.x,a.y)
        ctx.quadraticCurveTo(mx,my,b.x,b.y)
        ctx.strokeStyle=rgba(nav.color,alpha)
        ctx.lineWidth=(esActiva?1:.5)*devicePixelRatio
        ctx.setLineDash([]); ctx.stroke()

        if (esActiva) {
          const prog=((t*.35+i*.25)%1), t2=1-prog
          const px=t2*t2*a.x+2*t2*prog*mx+prog*prog*b.x
          const py=t2*t2*a.y+2*t2*prog*my+prog*prog*b.y
          ctx.beginPath(); ctx.arc(px,py,2.5*devicePixelRatio,0,Math.PI*2)
          ctx.fillStyle=rgba(nav.color,.7); ctx.fill()
        }
      }
    })
  }

  // ref para vectores
  const ref = hover||seleccionado||activo

  // vectores asociación
  if (ref) {
    getConns(ref.id).forEach(({nodo:o,peso}) => {
      if(!o) return
      const lg=ctx.createLinearGradient(ref.x,ref.y,o.x,o.y)
      lg.addColorStop(0,rgba(COLS[ref.eje],.6))
      lg.addColorStop(1,rgba(COLS[o.eje],.2))
      const mx=(ref.x+o.x)/2+(o.y-ref.y)*.13
      const my=(ref.y+o.y)/2-(o.x-ref.x)*.13
      ctx.beginPath(); ctx.moveTo(ref.x,ref.y)
      ctx.quadraticCurveTo(mx,my,o.x,o.y)
      ctx.strokeStyle=lg
      ctx.lineWidth=Math.max(.4,(peso/10)*1.5)*devicePixelRatio
      ctx.setLineDash([3*devicePixelRatio,5*devicePixelRatio])
      ctx.stroke(); ctx.setLineDash([])
      ctx.beginPath(); ctx.arc(o.x,o.y,2.5*devicePixelRatio,0,Math.PI*2)
      ctx.fillStyle=rgba(COLS[o.eje],.5); ctx.fill()
    })
  }

  // palabras
  nc.forEach(n => {
    const esH    = n===hover
    const esSel  = n===seleccionado
    const esA    = n===activo
    const esConn = ref && getConns(ref.id).some(c=>c.nodo===n)
    const enNarrActiva = narrativaActiva &&
      narrativaNodos.some(nn=>nn.narrativa_id===narrativaActiva.id&&nn.nodo_id===n.id)

    let esNavVecino = false
    if (narrativaActiva && activo) {
      const posAct = posEnNarrativa(narrativaActiva.id, activo.id)
      const posN   = posEnNarrativa(narrativaActiva.id, n.id)
      esNavVecino  = Math.abs(posN-posAct)===1
    }

    const dim = ref&&!esH&&!esSel&&!esA&&!esConn&&!enNarrActiva
    const fs  = (esH||esSel||esA)?n.fs*1.07:n.fs
    const pw  = (esH||esSel||esA)?400:300
    ctx.font=`${pw} ${fs}px ${FONT_WORDS}`
    const w=ctx.measureText(n.nombre).width

    if (esH||esSel||esA||esNavVecino) {
      ctx.beginPath()
      ctx.ellipse(n.x,n.y,w/2+16*devicePixelRatio,fs/2+9*devicePixelRatio,0,0,Math.PI*2)
      ctx.fillStyle=rgba(
        esNavVecino&&narrativaActiva?narrativaActiva.color:COLS[n.eje],
        (esA||esSel)?.09:.04
      )
      ctx.fill()
    }

    const al = dim?.06
      :esH     ?1
      :esA     ?.95
      :esSel   ?.9
      :esNavVecino?.82
      :esConn  ?.72
      :enNarrActiva?.45
      :ref     ?.22
      :vivo    ?.52
      :0

    const col=(esNavVecino&&narrativaActiva)?narrativaActiva.color:COLS[n.eje]
    ctx.fillStyle=rgba(col,al)
    ctx.textAlign='center'; ctx.textBaseline='middle'
    ctx.fillText(n.nombre,n.x,n.y)

    if (esH||esSel||esA||esConn||esNavVecino) {
      ctx.beginPath()
      ctx.moveTo(n.x-w/2,n.y+fs/2+2*devicePixelRatio)
      ctx.lineTo(n.x+w/2,n.y+fs/2+2*devicePixelRatio)
      ctx.strokeStyle=rgba(col,(esH||esSel||esA)?.65:.25)
      ctx.lineWidth=((esH||esSel||esA)?1:.4)*devicePixelRatio
      ctx.stroke()
    }
  })

  requestAnimationFrame(frame)
}

// ── HELPERS NARRATIVA ─────────────────────────────────────────────
function nodosDeNarrativa(navId) {
  return narrativaNodos
    .filter(nn=>nn.narrativa_id===navId)
    .sort((a,b)=>a.orden-b.orden)
    .map(nn=>nc.find(n=>n.id===nn.nodo_id))
    .filter(Boolean)
}

function narrativasDeNodo(nodoId) {
  const navIds=[...new Set(
    narrativaNodos.filter(nn=>nn.nodo_id===nodoId).map(nn=>nn.narrativa_id)
  )]
  return narrativas.filter(nav=>navIds.includes(nav.id))
}

function posEnNarrativa(navId,nodoId) {
  const nn=narrativaNodos.find(n=>n.narrativa_id===navId&&n.nodo_id===nodoId)
  return nn?nn.orden:-1
}

// ── CONEXIONES ────────────────────────────────────────────────────
function getConns(id) {
  return conxs
    .filter(c=>c.nodo_origen===id||(c.bidireccional&&c.nodo_destino===id))
    .map(c=>{
      const did=c.nodo_origen===id?c.nodo_destino:c.nodo_origen
      const bon=historial.filter(h=>h===did).length*1.5
      return {nodo:nc.find(n=>n.id===did),peso:Math.min(10,c.peso+bon),tipo:c.tipo_relacion}
    })
    .filter(c=>c.nodo)
    .sort((a,b)=>b.peso-a.peso)
}

// ── SELECCIONAR ───────────────────────────────────────────────────
function seleccionar(nodo) {
  if (seleccionado===nodo) { abrirPanel(nodo); return }
  seleccionado=nodo
  const navs=narrativasDeNodo(nodo.id)
  narrativaActiva=navs.length?navs[0]:null
  hint.textContent=`∿ click de nuevo para explorar ${nodo.nombre}`
  hint.style.opacity='1'
  setTimeout(()=>{ hint.style.opacity='0' },2500)
}

// ── ABRIR PANEL ───────────────────────────────────────────────────
async function abrirPanel(nodo) {
  activo=nodo; seleccionado=nodo
  historial.push(nodo.id)
  hint.style.opacity='0'

  const navs=narrativasDeNodo(nodo.id)
  narrativaActiva=navs.length?navs[0]:null

  mapa.classList.add('partido')
  panel.classList.add('visible')
  setTimeout(redim,680)

  document.getElementById('panel-nombre').textContent=nodo.nombre
  const ejEl=document.getElementById('panel-eje')
  ejEl.textContent=nodo.eje; ejEl.style.color=COLS[nodo.eje]

  const navBadge=document.getElementById('panel-narrativa')
  const navNombreEl=document.getElementById('panel-narrativa-nombre')
  const navDot2=document.getElementById('panel-narrativa-dot')
  if (narrativaActiva) {
    navNombreEl.textContent=narrativaActiva.nombre
    navDot2.style.background=narrativaActiva.color
    navBadge.classList.add('visible')
  } else { navBadge.classList.remove('visible') }

  const navNav=document.getElementById('panel-nav-narrativa')
  const btnPrev=document.getElementById('btn-prev')
  const btnNext=document.getElementById('btn-next')
  if (narrativaActiva) {
    const nns=nodosDeNarrativa(narrativaActiva.id)
    const idx=nns.findIndex(n=>n.id===nodo.id)
    navNav.classList.add('visible')
    btnPrev.disabled=idx<=0; btnNext.disabled=idx>=nns.length-1
  } else { navNav.classList.remove('visible') }

  document.getElementById('panel-txt').textContent=nodo.texto_principal||''

  const img=document.getElementById('panel-img')
  img.classList.remove('ok','hide'); img.src=''

  let frag=null
  if (historial.length>1) {
    const prev=historial[historial.length-2]
    const {data:cf}=await db.from('fragmentos').select('*')
      .eq('nodo_id',nodo.id).eq('contexto_previo',prev).limit(1)
    if (cf?.length) frag=cf[0]
  }
  if (!frag) {
    const {data:f}=await db.from('fragmentos').select('*')
      .eq('nodo_id',nodo.id).order('orden').limit(1)
    frag=f?.[0]||null
  }

  if (frag?.tipo==='imagen'&&frag?.url) {
    img.src=frag.url; img.onload=()=>img.classList.add('ok')
  } else { img.classList.add('hide') }

  const lista=document.getElementById('panel-asocs')
  lista.innerHTML=''
  getConns(nodo.id).slice(0,7).forEach(({nodo:o,peso,tipo})=>{
    if(!o) return
    const enNav=narrativaActiva&&
      narrativaNodos.some(nn=>nn.narrativa_id===narrativaActiva.id&&nn.nodo_id===o.id)
    const col=enNav&&narrativaActiva?narrativaActiva.color:COLS[o.eje]
    const el=document.createElement('div')
    el.style.cssText=`display:flex;align-items:center;gap:.6rem;
      margin-bottom:.85rem;cursor:pointer;opacity:.35;transition:opacity .3s;`
    el.onmouseenter=()=>el.style.opacity=1
    el.onmouseleave=()=>el.style.opacity=.35
    el.innerHTML=`
      <div style="width:${peso*3}px;height:1px;background:${col};opacity:.5;flex-shrink:0"></div>
      <span style="font-size:.75rem;letter-spacing:.06em;color:${col};
        font-family:'Barlow Condensed',sans-serif;font-weight:300">${o.nombre}</span>
      <span style="font-size:.48rem;letter-spacing:.2em;
        color:rgba(255,255,255,.15);text-transform:lowercase">${tipo||''}</span>
      ${enNav?`<span style="font-size:.42rem;color:${col};opacity:.6">∿</span>`:''}`
    el.onclick=()=>{ seleccionado=o; abrirPanel(o) }
    lista.appendChild(el)
  })
}

function navNarrativa(dir) {
  if (!narrativaActiva||!activo) return
  const nns=nodosDeNarrativa(narrativaActiva.id)
  const idx=nns.findIndex(n=>n.id===activo.id)
  const sig=nns[idx+dir]
  if (sig) { seleccionado=sig; abrirPanel(sig) }
}

function cerrar() {
  panel.classList.remove('visible','fullscreen')
  mapa.classList.remove('partido')
  activo=null; seleccionado=null; narrativaActiva=null
  document.getElementById('btn-fs').textContent='⤢ expandir'
  setTimeout(redim,680)
}

function toggleFS() {
  panel.classList.toggle('fullscreen')
  const fs=panel.classList.contains('fullscreen')
  mapa.style.display=fs?'none':'block'
  document.getElementById('btn-fs').textContent=fs?'⤡ contraer':'⤢ expandir'
  setTimeout(redim,680)
}

function hundirse() {
  const v=document.getElementById('velo')
  v.classList.add('on')
  setTimeout(()=>{
    document.getElementById('superficie').classList.add('oculto')
    vivo=true
    document.getElementById('leyenda').classList.add('visible')
    v.classList.remove('on')
    // conectar AIS al hundirse
    conectarAIS()
  },700)
}

// ── EVENTOS CANVAS ────────────────────────────────────────────────
function find(px,py) {
  return nc.slice().reverse().find(n=>{
    ctx.font=`300 ${n.fs}px ${FONT_WORDS}`
    const w=ctx.measureText(n.nombre).width
    const m=14*devicePixelRatio
    return px>=n.x-w/2-m&&px<=n.x+w/2+m&&py>=n.y-n.fs/2-m&&py<=n.y+n.fs/2+m
  })
}

function pos(e) {
  const r=cvs.getBoundingClientRect()
  const touch=e.touches?.[0]||e
  return [(touch.clientX-r.left)*devicePixelRatio,(touch.clientY-r.top)*devicePixelRatio]
}

cvs.addEventListener('mousemove',e=>{
  if(!vivo) return
  const [px,py]=pos(e)
  hover=find(px,py)||null
  cvs.style.cursor=hover?'pointer':'default'
  if(drag){drag.ox=(px-ddx)/devicePixelRatio;drag.oy=(py-ddy)/devicePixelRatio}
})

cvs.addEventListener('mouseleave',()=>{ hover=null })

cvs.addEventListener('mousedown',e=>{
  const [px,py]=pos(e)
  clickX=px; clickY=py
  const n=find(px,py)
  if(n){drag=n;ddx=px-n.ox*devicePixelRatio;ddy=py-n.oy*devicePixelRatio}
})

cvs.addEventListener('mouseup',e=>{
  const [px,py]=pos(e)
  const moved=Math.hypot(px-clickX,py-clickY)>5*devicePixelRatio
  const n=find(px,py)
  if(n&&!moved){
    seleccionar(n)
  } else if(!n&&!moved){
    seleccionado=null; activo=null; narrativaActiva=null
    if(panel.classList.contains('visible')) cerrar()
  }
  drag=null
})

cvs.addEventListener('touchstart',e=>{
  if(!vivo) return
  const [px,py]=pos(e)
  const n=find(px,py)
  if(n){ seleccionar(n) }
  else { seleccionado=null; activo=null; narrativaActiva=null
    if(panel.classList.contains('visible')) cerrar() }
},{passive:true})

window.addEventListener('resize',redim)

function rgba(hex,a){
  const r=parseInt(hex.slice(1,3),16)
  const g=parseInt(hex.slice(3,5),16)
  const b=parseInt(hex.slice(5,7),16)
  return `rgba(${r},${g},${b},${a})`
}

init()
</script>
