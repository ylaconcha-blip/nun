<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NùN — memoria oceánica</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --desastre:   #378ADD;
  --mitologia:  #7F77DD;
  --geopolitica:#D85A30;
  --biologia:   #1D9E75;
  --antropoceno:#BA7517;
  --bg: #050810;
}

body {
  background: var(--bg);
  font-family: 'Georgia', serif;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}

#mapa {
  position: fixed;
  top:0; left:0;
  width: 100%;
  height: 100%;
  transition: width 0.65s cubic-bezier(0.4,0,0.2,1),
              transform 0.65s cubic-bezier(0.4,0,0.2,1);
  z-index: 1;
}

#mapa.partido {
  width: 67%;
  transform: scale(0.96);
  transform-origin: center center;
}

canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* SUPERFICIE */
#superficie {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: opacity 1.5s ease;
}

#superficie.oculto {
  opacity: 0;
  pointer-events: none;
}

#titulo {
  font-size: clamp(5rem, 13vw, 10rem);
  font-weight: 300;
  letter-spacing: 0.35em;
  color: white;
  opacity: 0;
  animation: subir 2s ease 0.4s forwards;
}

#sub {
  font-size: clamp(0.7rem, 1.5vw, 0.9rem);
  letter-spacing: 0.5em;
  color: rgba(255,255,255,0.35);
  margin-top: 0.5rem;
  margin-bottom: 5rem;
  opacity: 0;
  animation: subir 2s ease 1s forwards;
  text-transform: lowercase;
}

#btn-hundirse {
  background: none;
  border: none;
  color: rgba(255,255,255,0.2);
  font-family: 'Georgia', serif;
  font-size: 0.75rem;
  letter-spacing: 0.6em;
  cursor: pointer;
  text-transform: lowercase;
  opacity: 0;
  animation: subir 2s ease 2.2s forwards;
  transition: color 0.6s;
}

#btn-hundirse:hover { color: rgba(255,255,255,0.6); }

#nav {
  position: fixed;
  top: 1.8rem; right: 2rem;
  display: flex;
  gap: 2.5rem;
  z-index: 110;
  opacity: 0;
  animation: subir 1s ease 3s forwards;
}

#nav a {
  color: rgba(255,255,255,0.2);
  text-decoration: none;
  font-size: 0.65rem;
  letter-spacing: 0.35em;
  text-transform: lowercase;
  transition: color 0.4s;
}

#nav a:hover { color: rgba(255,255,255,0.55); }

/* PANEL */
#panel {
  position: fixed;
  top:0; right:0;
  width: 33%;
  height: 100%;
  background: rgba(5,8,16,0.97);
  border-left: 1px solid rgba(255,255,255,0.05);
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.65s cubic-bezier(0.4,0,0.2,1);
  z-index: 40;
  overflow: hidden;
}

#panel.visible { transform: translateX(0); }
#panel.fullscreen { width: 100%; border-left: none; }

#panel-header {
  padding: 2rem 2rem 1.2rem;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-shrink: 0;
}

#panel-nombre {
  font-size: clamp(1.4rem, 2.5vw, 2.2rem);
  font-weight: 300;
  letter-spacing: 0.12em;
  color: white;
  line-height: 1;
}

#panel-eje {
  font-size: 0.55rem;
  letter-spacing: 0.4em;
  text-transform: lowercase;
  margin-top: 0.5rem;
  opacity: 0.6;
}

/* narrativa badge en el panel */
#panel-narrativa {
  font-size: 0.5rem;
  letter-spacing: 0.35em;
  text-transform: lowercase;
  margin-top: 0.4rem;
  opacity: 0;
  transition: opacity 0.5s;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

#panel-narrativa.visible { opacity: 0.7; }

#panel-narrativa-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  flex-shrink: 0;
}

#header-btns {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 0.6rem;
  flex-shrink: 0;
}

#btn-cerrar {
  background: none;
  border: none;
  color: rgba(255,255,255,0.35);
  cursor: pointer;
  font-size: 1.2rem;
  line-height: 1;
  transition: color 0.3s;
}

#btn-cerrar:hover { color: white; }

#btn-fs {
  background: none;
  border: none;
  color: rgba(255,255,255,0.15);
  cursor: pointer;
  font-size: 0.55rem;
  letter-spacing: 0.3em;
  text-transform: lowercase;
  font-family: 'Georgia', serif;
  transition: color 0.4s;
}

#btn-fs:hover { color: rgba(255,255,255,0.45); }

#panel-body {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: none;
}

#panel-body::-webkit-scrollbar { display: none; }

#panel-img {
  width: 100%;
  max-height: 45vh;
  object-fit: cover;
  display: block;
  opacity: 0;
  transition: opacity 1s ease;
}

#panel-img.ok   { opacity: 1; }
#panel-img.hide { display: none; }

#panel-txt {
  padding: 1.5rem 2rem;
  font-size: 0.82rem;
  line-height: 1.9;
  color: rgba(255,255,255,0.5);
}

/* navegación narrativa dentro del panel */
#panel-nav-narrativa {
  margin: 0 2rem 1.5rem;
  display: none;
  align-items: center;
  gap: 1rem;
}

#panel-nav-narrativa.visible { display: flex; }

.nav-btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.35);
  font-family: 'Georgia', serif;
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: lowercase;
  cursor: pointer;
  padding: 0.4rem 0.8rem;
  transition: all 0.3s;
  flex: 1;
  text-align: center;
}

.nav-btn:hover {
  border-color: rgba(255,255,255,0.25);
  color: rgba(255,255,255,0.7);
}

.nav-btn:disabled {
  opacity: 0.2;
  cursor: default;
}

#panel-footer {
  padding: 1.2rem 2rem 1.8rem;
  border-top: 1px solid rgba(255,255,255,0.04);
  flex-shrink: 0;
}

#footer-label {
  font-size: 0.5rem;
  letter-spacing: 0.45em;
  text-transform: lowercase;
  color: rgba(255,255,255,0.12);
  margin-bottom: 1rem;
}

/* LEYENDA */
#leyenda {
  position: fixed;
  bottom: 1.8rem; left: 1.8rem;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  z-index: 30;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1s ease;
}

#leyenda.visible { opacity: 0.3; }

/* narrativas en leyenda */
#leyenda-narrativas {
  margin-top: 0.8rem;
  padding-top: 0.8rem;
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.li {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.52rem;
  letter-spacing: 0.2em;
  text-transform: lowercase;
  color: rgba(255,255,255,0.9);
}

.ld {
  width: 4px; height: 4px;
  border-radius: 50%;
  flex-shrink: 0;
}

.ln {
  width: 16px; height: 1px;
  flex-shrink: 0;
}

#hint {
  position: fixed;
  bottom: 1.8rem;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.55rem;
  letter-spacing: 0.35em;
  color: rgba(255,255,255,0.12);
  text-transform: lowercase;
  z-index: 30;
  pointer-events: none;
  transition: opacity 0.5s;
  white-space: nowrap;
}

#velo {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.7s ease;
}

#velo.on { opacity: 1; }

@keyframes subir {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
</style>
</head>
<body>

<div id="velo"></div>
<div id="mapa"><canvas id="c"></canvas></div>

<div id="superficie">
  <nav id="nav">
    <a href="#">proyecto</a>
    <a href="#">archivo</a>
  </nav>
  <h1 id="titulo">NùN</h1>
  <p id="sub">memoria oceánica</p>
  <button id="btn-hundirse" onclick="hundirse()">∿ hundirse</button>
</div>

<div id="panel">
  <div id="panel-header">
    <div>
      <div id="panel-nombre"></div>
      <div id="panel-eje"></div>
      <div id="panel-narrativa">
        <div id="panel-narrativa-dot"></div>
        <span id="panel-narrativa-nombre"></span>
      </div>
    </div>
    <div id="header-btns">
      <button id="btn-cerrar" onclick="cerrar()">×</button>
      <button id="btn-fs" onclick="toggleFS()">⤢ expandir</button>
    </div>
  </div>
  <div id="panel-body">
    <img id="panel-img" src="" alt="">
    <p id="panel-txt"></p>
  </div>
  <div id="panel-nav-narrativa">
    <button class="nav-btn" id="btn-prev" onclick="navNarrativa(-1)">← anterior</button>
    <button class="nav-btn" id="btn-next" onclick="navNarrativa(1)">siguiente →</button>
  </div>
  <div id="panel-footer">
    <div id="footer-label">asociaciones</div>
    <div id="panel-asocs"></div>
  </div>
</div>

<div id="leyenda">
  <div class="li"><div class="ld" style="background:var(--desastre)"></div>desastre natural</div>
  <div class="li"><div class="ld" style="background:var(--mitologia)"></div>mitología</div>
  <div class="li"><div class="ld" style="background:var(--geopolitica)"></div>geopolítica</div>
  <div class="li"><div class="ld" style="background:var(--biologia)"></div>biología especulativa</div>
  <div class="li"><div class="ld" style="background:var(--antropoceno)"></div>antropoceno</div>
  <div id="leyenda-narrativas"></div>
</div>

<div id="hint"></div>

<script>
const SURL = 'https://uwduhddojpodzyvipbrq.supabase.co'
const SKEY = 'sb_publishable_V38s6emQE9jMQ54WhSIlJw_7WzJhGFY'
const { createClient } = supabase
const db = createClient(SURL, SKEY)

const COLS = {
  desastre:'#378ADD', mitologia:'#7F77DD',
  geopolitica:'#D85A30', biologia:'#1D9E75', antropoceno:'#BA7517'
}

let nodos=[], conxs=[], narrativas=[], narrativaNodos=[]
let nc=[]
let hover=null, seleccionado=null, activo=null
let historial=[], vivo=false
let t=0, drag=null, ddx=0, ddy=0, clickX=0, clickY=0

// narrativa activa en el panel
let narrativaActiva=null, posNarrativa=-1

const cvs = document.getElementById('c')
const ctx = cvs.getContext('2d')
const mapa = document.getElementById('mapa')
const panel = document.getElementById('panel')
const hint = document.getElementById('hint')

// ── CARGA ─────────────────────────────────────────────────────────
async function init() {
  const [{ data:n },{ data:c },{ data:nav },{ data:nn }] = await Promise.all([
    db.from('nodos').select('*').eq('activo',true),
    db.from('conexiones').select('*'),
    db.from('narrativas').select('*'),
    db.from('narrativa_nodos').select('*').order('orden')
  ])
  nodos = n||[]; conxs = c||[]
  narrativas = nav||[]; narrativaNodos = nn||[]
  setup()
  renderLeyendaNarrativas()
}

function renderLeyendaNarrativas() {
  const cont = document.getElementById('leyenda-narrativas')
  narrativas.forEach(nav => {
    const el = document.createElement('div')
    el.className = 'li'
    el.innerHTML = `
      <div class="ln" style="background:${nav.color};opacity:0.6"></div>
      <span>${nav.nombre}</span>`
    cont.appendChild(el)
  })
}

// ── SETUP ─────────────────────────────────────────────────────────
function setup() {
  redim()
  nc = nodos.map((n,i) => {
    const a = (i/nodos.length)*Math.PI*2
    const r = 0.2 + Math.random()*0.22
    const x = cvs.width/2 + Math.cos(a)*cvs.width*r
    const y = cvs.height/2 + Math.sin(a)*cvs.height*r*0.62
    return { ...n, x, y, ox:x, oy:y,
      fase: Math.random()*Math.PI*2,
      vel:  0.22+Math.random()*0.32,
      amp:  (7+Math.random()*13)*devicePixelRatio,
      fs:   (12+Math.random()*4)*devicePixelRatio
    }
  })
  frame()
}

function redim() {
  const w = mapa.offsetWidth
  const h = window.innerHeight
  cvs.width  = w*devicePixelRatio
  cvs.height = h*devicePixelRatio
  cvs.style.width  = w+'px'
  cvs.style.height = h+'px'
}

// ── NARRATIVAS: helpers ───────────────────────────────────────────

// devuelve array de nc ordenados para una narrativa
function nodosDeNarrativa(navId) {
  return narrativaNodos
    .filter(nn => nn.narrativa_id === navId)
    .sort((a,b) => a.orden - b.orden)
    .map(nn => nc.find(n => n.id === nn.nodo_id))
    .filter(Boolean)
}

// narrativas a las que pertenece un nodo
function narrativasDeNodo(nodoId) {
  const navIds = [...new Set(
    narrativaNodos
      .filter(nn => nn.nodo_id === nodoId)
      .map(nn => nn.narrativa_id)
  )]
  return narrativas.filter(nav => navIds.includes(nav.id))
}

// posición de un nodo en una narrativa
function posEnNarrativa(navId, nodoId) {
  const nn = narrativaNodos.find(n => n.narrativa_id===navId && n.nodo_id===nodoId)
  return nn ? nn.orden : -1
}

// ── RENDER ────────────────────────────────────────────────────────
function frame() {
  t += 0.006
  ctx.clearRect(0,0,cvs.width,cvs.height)

  // fondo radial
  const g = ctx.createRadialGradient(
    cvs.width/2,cvs.height/2,0,
    cvs.width/2,cvs.height/2,cvs.width*.65
  )
  g.addColorStop(0,'rgba(12,22,55,0.1)')
  g.addColorStop(1,'rgba(0,0,0,0)')
  ctx.fillStyle=g; ctx.fillRect(0,0,cvs.width,cvs.height)

  // flotar
  nc.forEach(n => {
    if(n===drag) return
    n.x = n.ox + Math.sin(t*n.vel+n.fase)*n.amp
    n.y = n.oy + Math.cos(t*n.vel*.7+n.fase*1.4)*n.amp*.55
  })

  // ── CORRIENTES NARRATIVAS (fondo, siempre visibles) ──
  if(vivo) {
    narrativas.forEach(nav => {
      const nns = nodosDeNarrativa(nav.id)
      if(nns.length < 2) return
      const esActiva = narrativaActiva && narrativaActiva.id === nav.id
      const alpha = esActiva ? 0.22 : 0.06

      for(let i=0; i<nns.length-1; i++) {
        const a = nns[i], b = nns[i+1]
        if(!a||!b) continue

        // pulso animado a lo largo de la corriente
        const prog = ((t*0.4 + i*0.3) % 1)
        const px = a.x + (b.x-a.x)*prog
        const py = a.y + (b.y-a.y)*prog

        const mx = (a.x+b.x)/2 + (b.y-a.y)*0.15
        const my = (a.y+b.y)/2 - (b.x-a.x)*0.15

        ctx.beginPath()
        ctx.moveTo(a.x,a.y)
        ctx.quadraticCurveTo(mx,my,b.x,b.y)
        ctx.strokeStyle = rgba(nav.color, alpha)
        ctx.lineWidth = (esActiva ? 1.2 : 0.6)*devicePixelRatio
        ctx.setLineDash([])
        ctx.stroke()

        // punto de pulso
        if(esActiva) {
          ctx.beginPath()
          ctx.arc(px,py,2.5*devicePixelRatio,0,Math.PI*2)
          ctx.fillStyle = rgba(nav.color,0.7)
          ctx.fill()
        }
      }
    })
  }

  // referencia para vectores de asociación
  const ref = hover || seleccionado || activo

  // ── VECTORES DE ASOCIACIÓN ──
  if(ref) {
    getConns(ref.id).forEach(({nodo:o,peso}) => {
      if(!o) return
      const lg = ctx.createLinearGradient(ref.x,ref.y,o.x,o.y)
      lg.addColorStop(0,rgba(COLS[ref.eje],.6))
      lg.addColorStop(1,rgba(COLS[o.eje],.2))
      const mx=(ref.x+o.x)/2+(o.y-ref.y)*.13
      const my=(ref.y+o.y)/2-(o.x-ref.x)*.13
      ctx.beginPath(); ctx.moveTo(ref.x,ref.y)
      ctx.quadraticCurveTo(mx,my,o.x,o.y)
      ctx.strokeStyle=lg
      ctx.lineWidth=Math.max(.4,(peso/10)*1.5)*devicePixelRatio
      ctx.setLineDash([3*devicePixelRatio,5*devicePixelRatio])
      ctx.stroke(); ctx.setLineDash([])
      ctx.beginPath()
      ctx.arc(o.x,o.y,2.5*devicePixelRatio,0,Math.PI*2)
      ctx.fillStyle=rgba(COLS[o.eje],.5); ctx.fill()
    })
  }

  // ── PALABRAS ──
  nc.forEach(n => {
    const esH   = n===hover
    const esSel = n===seleccionado
    const esA   = n===activo
    const esConn= ref && getConns(ref.id).some(c=>c.nodo===n)

    // nodo en narrativa activa
    const enNarrActiva = narrativaActiva &&
      narrativaNodos.some(nn=>nn.narrativa_id===narrativaActiva.id&&nn.nodo_id===n.id)

    // siguiente/anterior en narrativa
    let esNavVecino = false
    if(narrativaActiva && activo) {
      const posAct = posEnNarrativa(narrativaActiva.id, activo.id)
      const posN   = posEnNarrativa(narrativaActiva.id, n.id)
      esNavVecino = Math.abs(posN - posAct) === 1
    }

    const dim = ref && !esH && !esSel && !esA && !esConn && !enNarrActiva

    const fs = (esH||esSel||esA) ? n.fs*1.08 : n.fs
    ctx.font=`${(esH||esSel||esA)?400:300} ${fs}px Georgia,serif`
    const w = ctx.measureText(n.nombre).width

    if(esH||esSel||esA||esNavVecino) {
      ctx.beginPath()
      ctx.ellipse(n.x,n.y,w/2+16*devicePixelRatio,fs/2+9*devicePixelRatio,0,0,Math.PI*2)
      ctx.fillStyle=rgba(
        esNavVecino && narrativaActiva ? narrativaActiva.color : COLS[n.eje],
        (esA||esSel)?.1:.05
      )
      ctx.fill()
    }

    const al = dim?.06
      : esH        ? 1
      : esA        ? .95
      : esSel      ? .9
      : esNavVecino? .85
      : esConn     ? .75
      : enNarrActiva?.5
      : ref        ? .25
      : vivo       ? .55
      : 0

    // color: vecino narrativa usa color de narrativa
    const col = (esNavVecino && narrativaActiva) ? narrativaActiva.color : COLS[n.eje]
    ctx.fillStyle=rgba(col,al)
    ctx.textAlign='center'; ctx.textBaseline='middle'
    ctx.fillText(n.nombre,n.x,n.y)

    if(esH||esSel||esA||esConn||esNavVecino) {
      ctx.beginPath()
      ctx.moveTo(n.x-w/2,n.y+fs/2+2*devicePixelRatio)
      ctx.lineTo(n.x+w/2,n.y+fs/2+2*devicePixelRatio)
      ctx.strokeStyle=rgba(col,(esH||esSel||esA)?.7:.28)
      ctx.lineWidth=((esH||esSel||esA)?1:.4)*devicePixelRatio
      ctx.stroke()
    }
  })

  requestAnimationFrame(frame)
}

// ── CONEXIONES ────────────────────────────────────────────────────
function getConns(id) {
  return conxs
    .filter(c=>c.nodo_origen===id||(c.bidireccional&&c.nodo_destino===id))
    .map(c=>{
      const did = c.nodo_origen===id ? c.nodo_destino : c.nodo_origen
      const bon = historial.filter(h=>h===did).length*1.5
      return { nodo:nc.find(n=>n.id===did), peso:Math.min(10,c.peso+bon), tipo:c.tipo_relacion }
    })
    .filter(c=>c.nodo)
    .sort((a,b)=>b.peso-a.peso)
}

// ── SELECCIONAR (1er click) ───────────────────────────────────────
function seleccionar(nodo) {
  if(seleccionado===nodo) {
    abrirPanel(nodo)
    return
  }
  seleccionado = nodo

  // detectar narrativa del nodo para mostrarla
  const navs = narrativasDeNodo(nodo.id)
  narrativaActiva = navs.length ? navs[0] : null

  hint.textContent = `∿ click de nuevo para explorar ${nodo.nombre}`
  hint.style.opacity = '1'
  setTimeout(()=>{ hint.style.opacity='0' }, 2500)
}

// ── ABRIR PANEL (2do click) ───────────────────────────────────────
async function abrirPanel(nodo) {
  activo = nodo
  seleccionado = nodo
  historial.push(nodo.id)
  hint.style.opacity = '0'

  // detectar narrativa
  const navs = narrativasDeNodo(nodo.id)
  narrativaActiva = navs.length ? navs[0] : null
  if(narrativaActiva) {
    posNarrativa = posEnNarrativa(narrativaActiva.id, nodo.id)
  } else {
    posNarrativa = -1
  }

  mapa.classList.add('partido')
  panel.classList.add('visible')
  setTimeout(redim, 680)

  // header
  document.getElementById('panel-nombre').textContent = nodo.nombre
  const ejEl = document.getElementById('panel-eje')
  ejEl.textContent = nodo.eje
  ejEl.style.color = COLS[nodo.eje]

  // badge narrativa
  const navBadge = document.getElementById('panel-narrativa')
  const navNombre = document.getElementById('panel-narrativa-nombre')
  const navDot = document.getElementById('panel-narrativa-dot')
  if(narrativaActiva) {
    navNombre.textContent = narrativaActiva.nombre
    navDot.style.background = narrativaActiva.color
    navBadge.classList.add('visible')
  } else {
    navBadge.classList.remove('visible')
  }

  // nav narrativa
  const navNav = document.getElementById('panel-nav-narrativa')
  const btnPrev = document.getElementById('btn-prev')
  const btnNext = document.getElementById('btn-next')
  if(narrativaActiva) {
    const nns = nodosDeNarrativa(narrativaActiva.id)
    const idx = nns.findIndex(n=>n.id===nodo.id)
    navNav.classList.add('visible')
    btnPrev.disabled = idx <= 0
    btnNext.disabled = idx >= nns.length-1
  } else {
    navNav.classList.remove('visible')
  }

  document.getElementById('panel-txt').textContent = nodo.texto_principal||''

  const img = document.getElementById('panel-img')
  img.classList.remove('ok','hide'); img.src=''

  let frag = null
  if(historial.length>1) {
    const prev = historial[historial.length-2]
    const {data:cf} = await db.from('fragmentos').select('*')
      .eq('nodo_id',nodo.id).eq('contexto_previo',prev).limit(1)
    if(cf?.length) frag=cf[0]
  }
  if(!frag) {
    const {data:f} = await db.from('fragmentos').select('*')
      .eq('nodo_id',nodo.id).order('orden').limit(1)
    frag=f?.[0]||null
  }

  if(frag?.tipo==='imagen'&&frag?.url) {
    img.src=frag.url; img.onload=()=>img.classList.add('ok')
  } else { img.classList.add('hide') }

  // asociaciones
  const lista = document.getElementById('panel-asocs')
  lista.innerHTML=''
  getConns(nodo.id).slice(0,7).forEach(({nodo:o,peso,tipo})=>{
    if(!o) return
    const enNav = narrativaActiva &&
      narrativaNodos.some(nn=>nn.narrativa_id===narrativaActiva.id&&nn.nodo_id===o.id)
    const col = enNav && narrativaActiva ? narrativaActiva.color : COLS[o.eje]
    const el = document.createElement('div')
    el.style.cssText=`display:flex;align-items:center;gap:.6rem;
      margin-bottom:.85rem;cursor:pointer;opacity:.38;transition:opacity .3s;`
    el.onmouseenter=()=>el.style.opacity=1
    el.onmouseleave=()=>el.style.opacity=.38
    el.innerHTML=`
      <div style="width:${peso*3}px;height:1px;background:${col};
        opacity:.5;flex-shrink:0"></div>
      <span style="font-size:.78rem;letter-spacing:.07em;color:${col}">${o.nombre}</span>
      <span style="font-size:.5rem;letter-spacing:.2em;
        color:rgba(255,255,255,.18);text-transform:lowercase">${tipo||''}</span>
      ${enNav ? `<span style="font-size:.45rem;letter-spacing:.2em;color:${col};opacity:.6">∿</span>` : ''}`
    el.onclick=()=>{ seleccionado=o; abrirPanel(o) }
    lista.appendChild(el)
  })
}

// ── NAVEGAR EN NARRATIVA ──────────────────────────────────────────
function navNarrativa(dir) {
  if(!narrativaActiva||!activo) return
  const nns = nodosDeNarrativa(narrativaActiva.id)
  const idx = nns.findIndex(n=>n.id===activo.id)
  const siguiente = nns[idx+dir]
  if(siguiente) { seleccionado=siguiente; abrirPanel(siguiente) }
}

// ── CERRAR ────────────────────────────────────────────────────────
function cerrar() {
  panel.classList.remove('visible','fullscreen')
  mapa.classList.remove('partido')
  activo=null; seleccionado=null; narrativaActiva=null
  document.getElementById('btn-fs').textContent='⤢ expandir'
  setTimeout(redim,680)
}

function toggleFS() {
  panel.classList.toggle('fullscreen')
  const fs=panel.classList.contains('fullscreen')
  mapa.style.display=fs?'none':'block'
  document.getElementById('btn-fs').textContent=fs?'⤡ contraer':'⤢ expandir'
  setTimeout(redim,680)
}

// ── HUNDIRSE ──────────────────────────────────────────────────────
function hundirse() {
  const v=document.getElementById('velo')
  v.classList.add('on')
  setTimeout(()=>{
    document.getElementById('superficie').classList.add('oculto')
    vivo=true
    document.getElementById('leyenda').classList.add('visible')
    v.classList.remove('on')
  },700)
}

// ── EVENTOS ───────────────────────────────────────────────────────
function find(px,py) {
  return nc.slice().reverse().find(n=>{
    ctx.font=`300 ${n.fs}px Georgia,serif`
    const w=ctx.measureText(n.nombre).width
    return px>=n.x-w/2-12&&px<=n.x+w/2+12&&py>=n.y-n.fs/2-8&&py<=n.y+n.fs/2+8
  })
}

function pos(e) {
  const r=cvs.getBoundingClientRect()
  const touch=e.touches?.[0]||e
  return [(touch.clientX-r.left)*devicePixelRatio,(touch.clientY-r.top)*devicePixelRatio]
}

cvs.addEventListener('mousemove',e=>{
  if(!vivo) return
  const [px,py]=pos(e)
  hover=find(px,py)||null
  cvs.style.cursor=hover?'pointer':'default'
  if(drag){ drag.ox=(px-ddx)/devicePixelRatio; drag.oy=(py-ddy)/devicePixelRatio }
})

cvs.addEventListener('mouseleave',()=>{ hover=null })

cvs.addEventListener('mousedown',e=>{
  const [px,py]=pos(e)
  clickX=px; clickY=py
  const n=find(px,py)
  if(n){ drag=n; ddx=px-n.ox*devicePixelRatio; ddy=py-n.oy*devicePixelRatio }
})

cvs.addEventListener('mouseup',e=>{
  const [px,py]=pos(e)
  const moved=Math.hypot(px-clickX,py-clickY)>5*devicePixelRatio
  const n=find(px,py)
  if(n&&!moved) seleccionar(n)
  drag=null
})

cvs.addEventListener('touchstart',e=>{
  if(!vivo) return
  const [px,py]=pos(e)
  const n=find(px,py)
  if(n) seleccionar(n)
},{passive:true})

window.addEventListener('resize',redim)

function rgba(hex,a){
  const r=parseInt(hex.slice(1,3),16)
  const g=parseInt(hex.slice(3,5),16)
  const b=parseInt(hex.slice(5,7),16)
  return `rgba(${r},${g},${b},${a})`
}

init()
</script>
